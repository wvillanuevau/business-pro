      <div class="fg span2"><label>Nombre *</label><input id="pNombre" placeholder="Ej: Corte clásico"></div>
      <div class="fg"><label>Tipo</label><select id="pTipo"><option value="servicio">Servicio</option><option value="producto">Producto</option></select></div>
      <div class="fg"><label>Precio de venta *</label><input id="pPrecio" type="number" min="0" step="0.01" placeholder="0.00"></div>
      <div class="fg"><label>Costo (productos)</label><input id="pCosto" type="number" min="0" step="0.01" placeholder="0.00"></div>
      <div class="fg"><label>Stock inicial</label><input id="pStock" type="number" min="0" placeholder="0"></div>
      <div class="fg"><label>Categoría</label><input id="pCat" placeholder="Ej: Cortes, Tintes..."></div>
      <div class="fg span2"><label>Código de barras</label>
        <div class="barcode-input-wrap">
          <span>🔍</span>
          <input id="pCodigo" placeholder="Escanea con lector USB o escribe el código">

        </div>
        <div id="cameraCatalogWrap" style="display:none;margin-top:.5rem">
          <div class="scanner-wrap" style="max-height:200px">
            <video id="scannerCatalog" style="width:100%;max-height:200px"></video>

          </div>
          <button class="btn btn-ghost btn-xs" id="btnStopCamaraCatalogo" style="width:100%;margin-top:.25rem">⏹ Detener</button>
        </div>
      </div>
      <input type="hidden" id="pEditId">
      <div style="display:flex;gap:.5rem;align-items:flex-end">
        <button class="btn btn-primary" id="btnGuardarProd">Guardar</button>
        <button class="btn btn-ghost" id="btnCancelarProd">Cancelar</button>
      </div>
    </div>
  </div>
  <div class="card"><div class="card-title">Productos y Servicios (${STATE.productos.length})</div>

  <tbody>${filas}</tbody></table></div></div>`;
}

// ════════════════════════════════════════════════════════════
//  GASTOS
// ════════════════════════════════════════════════════════════
function renderGastos(){
  const total=STATE.gastos.reduce((s,g)=>s+g.monto,0);
  // Por categoría
  const catMap={};
  STATE.gastos.forEach(g=>{ catMap[g.categoria]=(catMap[g.categoria]||0)+g.monto; });

function renderAgenda(){
  if(!STATE.calMes) STATE.calMes=new Date();
  const mes=STATE.calMes;
  const anioMes=`${mes.getFullYear()}-${String(mes.getMonth()+1).padStart(2,"0")}`;
  const primerDia=new Date(mes.getFullYear(),mes.getMonth(),1).getDay();
  const diasMes=new Date(mes.getFullYear(),mes.getMonth()+1,0).getDate();
  const tdHoy=today();

  // Citas del mes
  const citasMes=STATE.citas.filter(c=>c.fecha.startsWith(anioMes));

  let celdas="";
  // Días vacíos inicio
  const ini=primerDia===0?6:primerDia-1;
  for(let i=0;i<ini;i++) celdas+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=diasMes;d++){
    const ds=`${anioMes}-${String(d).padStart(2,"0")}`;
    const citasDia=citasMes.filter(c=>c.fecha===ds);
    const isToday=ds===tdHoy;
    celdas+=`<div class="cal-day ${isToday?"today":""}" data-fecha="${ds}">
      <div class="cal-day-num">${d}</div>
      ${citasDia.map(c=>`<div class="cal-event ${c.tipo||""}">${c.hora} ${c.titulo}</div>`).join("")}
    </div>`;
  }

  const citasHoy2=STATE.citas.filter(c=>c.fecha===tdHoy).sort((a,b)=>a.hora.localeCompare(b.hora));

  return `<div class="page-header"><div class="page-title">◷ Agenda</div>
    <button class="btn btn-primary" id="btnNuevaCita">+ Nueva Cita</button>
  </div>
  <div class="card" id="formCita" style="display:none">
    <div class="card-title">Nueva Cita</div>
    <div class="form-grid">
      <div class="fg span2"><label>Título *</label><input id="citTit" placeholder="Ej: Corte de cabello"></div>
      <div class="fg"><label>Fecha *</label><input id="citFecha" type="date" value="${tdHoy}"></div>
      <div class="fg"><label>Hora *</label><input id="citHora" type="time" value="${nowTime()}"></div>
      <div class="fg"><label>Duración (min)</label><input id="citDur" type="number" value="30" min="5" step="5"></div>
      <div class="fg"><label>Cliente</label><select id="citCli"><option value="">Sin asignar</option>${STATE.clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join("")}</select></div>
      <div class="fg"><label>Empleado</label><select id="citEmp"><option value="">Sin asignar</option>${STATE.usuarios.map(u=>`<option value="${u.id}">${u.nombre||u.username}</option>`).join("")}</select></div>
      <div class="fg"><label>Tipo</label><select id="citTipo"><option value="servicio">Servicio</option><option value="ocupado">Bloqueado</option></select></div>
      <div class="fg span2"><label>Notas</label><input id="citNotas" placeholder="Observaciones"></div>
      <div style="display:flex;gap:.5rem;align-items:flex-end">
        <button class="btn btn-primary" id="btnGuardarCita">Guardar</button>
        <button class="btn btn-ghost" id="btnCancelarCita">Cancelar</button>
      </div>
    </div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="cal-nav">
        <button class="btn btn-ghost btn-sm" id="calPrev">←</button>
        <div class="cal-nav-title">${mes.toLocaleString("es",{month:"long",year:"numeric"})}</div>
        <button class="btn btn-ghost btn-sm" id="calNext">→</button>
      </div>
      <div class="cal-header">${["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"].map(d=>`<div class="cal-day-header">${d}</div>`).join("")}</div>
      <div class="cal-grid">${celdas}</div>
    </div>
    <div class="card"><div class="card-title">📅 Citas de hoy — ${tdHoy}</div>
      ${citasHoy2.length?`<div class="table-wrap"><table><thead><tr><th>Hora</th><th>Título</th><th>Cliente</th><th>Emp.</th><th></th></tr></thead><tbody>
      ${citasHoy2.map(c=>{const cl=STATE.clientes.find(x=>x.id===c.clienteId);const emp=STATE.usuarios.find(u=>u.id===c.empleadoId);return`<tr>

function calcComisionesEmp(empId, desde, hasta){
  const ventas=STATE.ingresos.filter(i=>{
    if(i.metodoPago==="ajuste") return false; // excluir ajustes de inventario
    if(i.empleadoId!==empId) return false;
    if(desde && i.fecha<desde) return false;
    if(hasta && i.fecha>hasta) return false;
    return true;
  });
  const total=ventas.reduce((s,i)=>s+i.total,0);
  const emp=STATE.usuarios.find(u=>u.id===empId);
  const pct=emp?.comision||0;
  return {ventas, total, comision:total*(pct/100)};
}

// ── Motor de reportes — calcula datos para cualquier rango ──
function calcReporteData(desde, hasta){
  const ings = STATE.ingresos.filter(i=>
    i.metodoPago!=="ajuste" &&
    (!desde||i.fecha>=desde) && (!hasta||i.fecha<=hasta)
  );
  const gas  = STATE.gastos.filter(g=>(!desde||g.fecha>=desde)&&(!hasta||g.fecha<=hasta));
  const citas= STATE.citas.filter(c=>(!desde||c.fecha>=desde)&&(!hasta||c.fecha<=hasta));

  const totalIng = ings.reduce((s,i)=>s+i.total,0);
  const totalGas = gas.reduce((s,g)=>s+g.monto,0);
  const utilidad  = totalIng - totalGas;

  // Visitas únicas
  const visitas = [...new Set(ings.map(i=>i.visitaId||("v"+i.id)))];
  const ticketProm = visitas.length ? totalIng/visitas.length : 0;

  // Por producto
  const porProd = {};
  ings.forEach(i=>{
    const p=STATE.productos.find(pr=>pr.id===i.productoId);
    const nombre=p?.nombre||"Sin nombre";
    if(!porProd[nombre]) porProd[nombre]={nombre,qty:0,revenue:0};
    porProd[nombre].qty+=i.cantidad;
    porProd[nombre].revenue+=i.total;
  });
  const topProds = Object.values(porProd).sort((a,b)=>b.revenue-a.revenue);
  const sinMovimiento = STATE.productos.filter(p=>{
    const d30=new Date(); d30.setDate(d30.getDate()-30);
    const d30s=d30.toISOString().slice(0,10);
    return !STATE.ingresos.some(i=>i.productoId===p.id && i.fecha>=d30s);
  });

  // Por hora
  const porHora = Array(24).fill(0);
  ings.forEach(i=>{
    if(i.hora){ const h=parseInt(i.hora.split(":")[0]); if(h>=0&&h<24) porHora[h]+=i.total; }
  });

  // Por día de semana
  const dias=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const porDia = Array(7).fill(0);
  ings.forEach(i=>{
    if(i.fecha){ const d=new Date(i.fecha+"T12:00:00"); porDia[d.getDay()]+=i.total; }
  });

  // Por semana
  const porSemana = {};
  ings.forEach(i=>{
    if(!i.fecha) return;
    const d=new Date(i.fecha+"T12:00:00");
    const dow=d.getDay(); const diff=d.getDate()-dow+(dow===0?-6:1);
    const lun=new Date(d.setDate(diff));
    const key=lun.toISOString().slice(0,10);
    if(!porSemana[key]) porSemana[key]=0;
    porSemana[key]+=i.total;
  });

  // Por mes
  const porMes = {};
  ings.forEach(i=>{
    if(!i.fecha) return;
    const m=i.fecha.slice(0,7);
    if(!porMes[m]) porMes[m]=0;
    porMes[m]+=i.total;
  });

  // Por empleado
  const porEmp = {};
  ings.forEach(i=>{
    const e=STATE.usuarios.find(u=>u.id===i.empleadoId);
    const nombre=e?.nombre||e?.username||"Sin asignar";
    if(!porEmp[nombre]) porEmp[nombre]={nombre,qty:0,revenue:0,comision:0};
    porEmp[nombre].qty+=i.cantidad; porEmp[nombre].revenue+=i.total;
    porEmp[nombre].comision+=i.total*((e?.comision||0)/100);
  });

  // Por cliente
  const porCli = {};
  ings.forEach(i=>{
    const c=STATE.clientes.find(x=>x.id===i.clienteId);
    const nombre=c?.nombre||"Consumidor Final";
    if(!porCli[nombre]) porCli[nombre]={nombre,visitas:new Set(),revenue:0};
    porCli[nombre].visitas.add(i.visitaId||("v"+i.id));
    porCli[nombre].revenue+=i.total;
  });
  const topClis=Object.values(porCli).map(c=>({...c,visitas:c.visitas.size})).sort((a,b)=>b.revenue-a.revenue);

  // Clientes sin visita >30 días
  const hoy=today();
  const sinVisita30=STATE.clientes.filter(c=>{
    const ultIngreso=STATE.ingresos.filter(i=>i.clienteId===c.id).sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
    if(!ultIngreso) return true;
    const d=new Date(hoy); d.setDate(d.getDate()-30);
    return ultIngreso.fecha < d.toISOString().slice(0,10);
  });

  // Clientes nuevos vs recurrentes
  const clientesNuevos=STATE.clientes.filter(c=>c.fechaRegistro>=desde&&c.fechaRegistro<=hasta).length;

  // Gastos por categoría
  const porCatGas = {};
  gas.forEach(g=>{
    const cat=g.categoria||"Sin categoría";
    if(!porCatGas[cat]) porCatGas[cat]=0;
    porCatGas[cat]+=g.monto;
  });

  // Métodos de pago
  const porMetodo = {};
  ings.forEach(i=>{
    const m=i.metodoPago||"efectivo";
    if(!porMetodo[m]) porMetodo[m]=0;
    porMetodo[m]+=i.total;
  });

  // Proyección mensual (basada en días transcurridos)
  const diasEnRango = desde&&hasta ? Math.max(1,Math.round((new Date(hasta)-new Date(desde))/86400000)) : 30;
  const promedioD = totalIng / diasEnRango;
  const proyeccion30 = promedioD * 30;

  // Conversión citas → ventas
  const totalCitas = citas.length;
  const citasConVenta = citas.filter(c=>
    ings.some(i=>i.clienteId===c.clienteId && i.fecha===c.fecha)
  ).length;
  const tasaConversion = totalCitas ? (citasConVenta/totalCitas*100) : 0;

  // Comparativo mes anterior
  const mesA = desde ? desde.slice(0,7) : hoy.slice(0,7);
  const [anio,mes] = mesA.split("-").map(Number);
  const mesAntStr = `${anio}${mes===1?`-${anio-1}-12`:`-${String(mes-1).padStart(2,"0")}`}`.replace(/^\d{4}/,anio-(mes===1?1:0));
  const mesAntFormatted = mes===1 ? `${anio-1}-12` : `${anio}-${String(mes-1).padStart(2,"0")}`;
  const ingsMesAnt=STATE.ingresos.filter(i=>i.fecha?.startsWith(mesAntFormatted)&&i.metodoPago!=="ajuste").reduce((s,i)=>s+i.total,0);
  const cambioMes = ingsMesAnt>0 ? ((totalIng-ingsMesAnt)/ingsMesAnt*100) : 0;

  return {
    ings, gas, totalIng, totalGas, utilidad, visitas, ticketProm,
    topProds, sinMovimiento, porHora, porDia, dias, porSemana, porMes,
    porEmp, topClis, sinVisita30, clientesNuevos, porCatGas, porMetodo,
    proyeccion30, promedioD, tasaConversion, totalCitas, citasConVenta,
    ingsMesAnt, cambioMes, diasEnRango
  };
}

function renderReportes(){
  const hoy=today();
  const mesActual=hoy.slice(0,7);
  const d=calcReporteData(mesActual+"-01",hoy);
  const bar=(val,max,color="var(--accent)")=>{
    const pct=max>0?Math.round(val/max*100):0;
    return `<div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:3px">
      <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width .3s"></div></div>`;
  };

  return `<div class="page-header"><div class="page-title">◉ Reportes & Analytics</div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" id="btnExportJSON">📤 Backup</button>
      <button class="btn btn-outline btn-sm" id="btnExportCSVIng">📊 CSV Ventas</button>
      <button class="btn btn-ghost btn-sm" id="btnImportJSON">📥 Importar</button>
    </div>
  </div>

  <!-- FILTRO GLOBAL -->
  <div class="card" style="margin-bottom:1.25rem">
    <div style="display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end">
      <div class="fg"><label>Desde</label><input id="repDesde" type="date" value="${mesActual+"-01"}"></div>
      <div class="fg"><label>Hasta</label><input id="repHasta" type="date" value="${hoy}"></div>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:flex-end">
        <button class="btn btn-ghost btn-xs" data-rango="hoy">Hoy</button>
        <button class="btn btn-ghost btn-xs" data-rango="semana">Esta semana</button>
        <button class="btn btn-ghost btn-xs" data-rango="mes">Este mes</button>
        <button class="btn btn-ghost btn-xs" data-rango="trimestre">Trimestre</button>
        <button class="btn btn-ghost btn-xs" data-rango="anio">Este año</button>
        <button class="btn btn-primary btn-sm" id="btnGenReporte">Generar →</button>
      </div>
    </div>
  </div>

  <!-- KPIs PRINCIPALES -->
  <div class="stats-grid" id="repKpis">
    <div class="stat"><div class="stat-icon">💰</div><div class="stat-label">Ingresos período</div><div class="stat-value c-green">${fmtMoney(d.totalIng)}</div></div>
    <div class="stat"><div class="stat-icon">💸</div><div class="stat-label">Gastos período</div><div class="stat-value c-red">${fmtMoney(d.totalGas)}</div></div>
    <div class="stat"><div class="stat-icon">📈</div><div class="stat-label">Utilidad neta</div><div class="stat-value ${d.utilidad>=0?"c-green":"c-red"}">${fmtMoney(d.utilidad)}</div></div>
    <div class="stat"><div class="stat-icon">🧾</div><div class="stat-label">Ticket promedio</div><div class="stat-value c-accent">${fmtMoney(d.ticketProm)}</div></div>
    <div class="stat"><div class="stat-icon">👥</div><div class="stat-label">Visitas únicas</div><div class="stat-value">${d.visitas.length}</div></div>
    <div class="stat"><div class="stat-icon">📅</div><div class="stat-label">vs mes anterior</div>
      <div class="stat-value ${d.cambioMes>=0?"c-green":"c-red"}">${d.cambioMes>=0?"+":""}${d.cambioMes.toFixed(1)}%</div></div>
    <div class="stat"><div class="stat-icon">🎯</div><div class="stat-label">Proyección 30d</div><div class="stat-value c-blue">${fmtMoney(d.proyeccion30)}</div></div>
    <div class="stat"><div class="stat-icon">🔄</div><div class="stat-label">Conversión citas</div><div class="stat-value">${d.tasaConversion.toFixed(1)}%</div></div>
  </div>

  <div id="repAllReportes">
  ${buildAllReportes(d, bar)}
  </div>`;
}

function buildAllReportes(d, bar){
  const fmtM = fmtMoney;
  const maxHora = Math.max(...d.porHora,1);
  const maxDia  = Math.max(...d.porDia,1);
  const maxProd = d.topProds[0]?.revenue||1;
  const maxEmp  = Math.max(...Object.values(d.porEmp).map(e=>e.revenue),1);
  const maxCli  = d.topClis[0]?.revenue||1;

  return `
  <!-- ══ SECCIÓN VENTAS ══ -->
  <div style="font-size:.78rem;font-weight:800;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin:1.25rem 0 .75rem">
    📊 Análisis de Ventas
  </div>
  <div class="two-col" style="align-items:start">

    <!-- R1: Ventas por hora -->
    <div class="card">
      <div class="card-title">1. Mapa de calor — Tráfico por hora</div>
      <div class="card-sub">Identifica la hora pico de operaciones</div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:.3rem;margin-top:.5rem">
        ${d.porHora.map((v,h)=>`
          <div style="text-align:center">
            <div style="font-size:.65rem;color:var(--text2)">${h}h</div>
            <div style="height:${Math.max(4,Math.round(v/maxHora*60))}px;
              background:${v===Math.max(...d.porHora)?"var(--accent)":v>maxHora*.5?"var(--blue)":"var(--surface3)"};
              border-radius:3px;margin:.1rem 0"></div>
            <div style="font-size:.6rem;color:var(--text3)">${v>0?fmtM(v):""}</div>
          </div>`).join("")}
      </div>
      <div style="margin-top:.5rem;font-size:.78rem;color:var(--text2)">
        Hora pico: <strong>${d.porHora.indexOf(Math.max(...d.porHora))}:00 — ${fmtM(Math.max(...d.porHora))}</strong>
      </div>
    </div>

    <!-- R2: Ventas por día de semana -->
    <div class="card">
      <div class="card-title">2. Ventas por día de semana</div>
      <div class="card-sub">¿Qué días son más rentables?</div>
      ${d.porDia.map((v,i)=>`
        <div style="display:flex;align-items:center;gap:.5rem;margin:.35rem 0">
          <span style="width:28px;font-size:.78rem;font-weight:600;color:var(--text2)">${d.dias[i]}</span>
          <div style="flex:1">${bar(v,maxDia,v===Math.max(...d.porDia)?"var(--accent)":"var(--blue)")}</div>
          <span style="font-size:.78rem;font-weight:600;min-width:60px;text-align:right">${fmtM(v)}</span>
        </div>`).join("")}
    </div>

    <!-- R3: Ventas por semana -->
    <div class="card">
      <div class="card-title">3. Tendencia semanal</div>
      <div class="card-sub">Evolución semana a semana</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Semana inicio</th><th class="amt">Total</th></tr></thead>
        <tbody>
        ${Object.entries(d.porSemana).sort((a,b)=>a[0].localeCompare(b[0])).map(([sem,val])=>`
          <tr><td style="font-size:.8rem">${sem}</td><td class="amt-green">${fmtM(val)}</td></tr>`).join("")||"<tr><td colspan='2' style='text-align:center;color:var(--text2)'>Sin datos</td></tr>"}
        </tbody>
      </table></div>
    </div>

    <!-- R4: Ventas por mes -->
    <div class="card">
      <div class="card-title">4. Tendencia mensual</div>
      <div class="card-sub">Histórico mes a mes</div>
      ${Object.entries(d.porMes).sort((a,b)=>a[0].localeCompare(b[0])).map(([mes,val])=>{
        const maxV=Math.max(...Object.values(d.porMes),1);
        return `<div style="display:flex;align-items:center;gap:.5rem;margin:.3rem 0">
          <span style="width:55px;font-size:.75rem;color:var(--text2)">${mes}</span>
          <div style="flex:1">${bar(val,maxV)}</div>
          <span style="font-size:.78rem;min-width:65px;text-align:right">${fmtM(val)}</span>
        </div>`;
      }).join("")||"<div style='color:var(--text2);font-size:.82rem'>Sin datos en el rango</div>"}
    </div>

    <!-- R5: Comparativo mes actual vs anterior -->
    <div class="card">
      <div class="card-title">5. Comparativo mes actual vs anterior</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:.5rem">
        <div style="text-align:center;padding:1rem;background:var(--surface2);border-radius:var(--r)">
          <div style="font-size:.75rem;color:var(--text2)">Mes anterior</div>
          <div style="font-size:1.4rem;font-weight:800;color:var(--text)">${fmtM(d.ingsMesAnt)}</div>
        </div>
        <div style="text-align:center;padding:1rem;background:var(--surface2);border-radius:var(--r)">
          <div style="font-size:.75rem;color:var(--text2)">Período actual</div>
          <div style="font-size:1.4rem;font-weight:800;color:${d.totalIng>=d.ingsMesAnt?"var(--green)":"var(--red)"}">${fmtM(d.totalIng)}</div>
        </div>
      </div>
      <div style="text-align:center;margin-top:.75rem;font-size:1.1rem;font-weight:700;color:${d.cambioMes>=0?"var(--green)":"var(--red)"}">
        ${d.cambioMes>=0?"▲":"▼"} ${Math.abs(d.cambioMes).toFixed(1)}% vs mes anterior
      </div>
    </div>

    <!-- R7: Proyección mensual -->
    <div class="card">
      <div class="card-title">7. Proyección a 30 días</div>
      <div class="card-sub">Basada en el promedio del período seleccionado</div>
      <div style="text-align:center;padding:1rem">
        <div style="font-size:.8rem;color:var(--text2)">Promedio diario</div>
        <div style="font-size:1.2rem;font-weight:700">${fmtM(d.promedioD)}/día</div>
        <div style="font-size:.8rem;color:var(--text2);margin-top:.5rem">Proyección 30 días</div>
        <div style="font-size:2rem;font-weight:800;color:var(--accent)">${fmtM(d.proyeccion30)}</div>
      </div>
    </div>
  </div>

  <!-- ══ SECCIÓN PRODUCTOS ══ -->
  <div style="font-size:.78rem;font-weight:800;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin:1.25rem 0 .75rem">
    🏆 Análisis de Productos y Servicios
  </div>
  <div class="two-col" style="align-items:start">

    <!-- R6: Top productos -->
    <div class="card">
      <div class="card-title">6. Top 10 productos / servicios</div>
      <div class="card-sub">Por revenue generado en el período</div>
      ${d.topProds.slice(0,10).map((p,i)=>`
        <div style="display:flex;align-items:center;gap:.5rem;margin:.4rem 0">
          <span style="width:20px;font-size:.72rem;font-weight:700;color:var(--text3)">${i+1}</span>
          <div style="flex:1">
            <div style="font-size:.82rem;font-weight:600">${p.nombre}</div>
            ${bar(p.revenue,maxProd)}
          </div>
          <div style="text-align:right">
            <div style="font-size:.82rem;font-weight:700">${fmtM(p.revenue)}</div>
            <div style="font-size:.7rem;color:var(--text2)">${p.qty} uds</div>
          </div>
        </div>`).join("")||"<div style='color:var(--text2)'>Sin datos</div>"}
    </div>

    <!-- R8: Categoría más rentable -->
    <div class="card">
      <div class="card-title">8. Revenue por categoría</div>
      <div class="card-sub">Categorías de productos y servicios</div>
      ${(()=>{
        const cats={};
        d.ings.forEach(i=>{
          const p=STATE.productos.find(pr=>pr.id===i.productoId);
          const cat=p?.categoria||p?.tipo||"Sin categoría";
          if(!cats[cat]) cats[cat]=0;
          cats[cat]+=i.total;
        });
        const maxC=Math.max(...Object.values(cats),1);
        return Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`
          <div style="display:flex;align-items:center;gap:.5rem;margin:.35rem 0">
            <span style="flex:1;font-size:.8rem">${c}</span>
            <div style="width:100px">${bar(v,maxC)}</div>
            <span style="font-size:.78rem;min-width:60px;text-align:right">${fmtM(v)}</span>
          </div>`).join("")||"<div style='color:var(--text2)'>Sin datos</div>";
      })()}
    </div>

    <!-- R9: Productos sin movimiento -->
    <div class="card">
      <div class="card-title">9. Productos sin movimiento — últimos 30 días</div>
      <div class="card-sub">Considera descontinuar o promocionar estos productos</div>
      ${d.sinMovimiento.length?
        `<div class="table-wrap"><table>
          <thead><tr><th>Producto</th><th>Tipo</th><th>Stock</th></tr></thead>
          <tbody>
          ${d.sinMovimiento.slice(0,10).map(p=>`<tr>
            <td>${p.nombre}</td>
            <td><span class="badge bg-gray">${p.tipo||"—"}</span></td>
            <td class="amt">${p.stock??"—"}</td>
          </tr>`).join("")}
          </tbody>
        </table></div>`:
        `<div class="empty"><p>✅ Todos los productos tienen movimiento</p></div>`}
    </div>

    <!-- R22: Métodos de pago -->
    <div class="card">
      <div class="card-title">22. Métodos de pago más usados</div>
      ${(()=>{
        const maxM=Math.max(...Object.values(d.porMetodo),1);
        return Object.entries(d.porMetodo).sort((a,b)=>b[1]-a[1]).map(([m,v])=>`
          <div style="display:flex;align-items:center;gap:.5rem;margin:.35rem 0">
            <span style="flex:1;font-size:.82rem;font-weight:600;text-transform:capitalize">${m}</span>
            <div style="width:80px">${bar(v,maxM,"var(--green)")}</div>
            <span style="font-size:.78rem;min-width:60px;text-align:right">${fmtM(v)}</span>
          </div>`).join("")||"<div style='color:var(--text2)'>Sin datos</div>";
      })()}
    </div>
  </div>

  <!-- ══ SECCIÓN CLIENTES ══ -->
  <div style="font-size:.78rem;font-weight:800;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin:1.25rem 0 .75rem">
    👥 Análisis de Clientes
  </div>
  <div class="two-col" style="align-items:start">

    <!-- R10: Clientes nuevos vs recurrentes -->
    <div class="card">
      <div class="card-title">10. Clientes nuevos vs recurrentes</div>
      ${(()=>{
        const clientesConVenta=new Set(d.ings.filter(i=>i.clienteId).map(i=>i.clienteId));
        const nuevos=STATE.clientes.filter(c=>c.id&&!STATE.ingresos.some(i=>i.clienteId===c.id&&i.fecha<(d.ings[0]?.fecha||today()))).length;
        const recurrentes=clientesConVenta.size - nuevos;
        const total=clientesConVenta.size||1;
        return `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:.5rem">
          <div style="text-align:center;padding:.75rem;background:var(--green-dim);border-radius:var(--r)">
            <div style="font-size:1.6rem;font-weight:800;color:var(--green)">${clientesConVenta.size}</div>
            <div style="font-size:.75rem;color:var(--text2)">Clientes activos</div>
          </div>
          <div style="text-align:center;padding:.75rem;background:var(--blue-dim);border-radius:var(--r)">
            <div style="font-size:1.6rem;font-weight:800;color:var(--blue)">${STATE.clientes.length}</div>
            <div style="font-size:.75rem;color:var(--text2)">Total registrados</div>
          </div>
        </div>`;
      })()}
    </div>

    <!-- R11: Top clientes -->
    <div class="card">
      <div class="card-title">11. Top clientes por gasto</div>
      ${d.topClis.slice(0,8).map((c,i)=>`
        <div style="display:flex;align-items:center;gap:.5rem;margin:.35rem 0">
          <span style="width:18px;font-size:.7rem;color:var(--text3)">${i+1}</span>
          <div style="flex:1">
            <div style="font-size:.82rem;font-weight:600">${c.nombre}</div>
            ${bar(c.revenue,maxCli,"var(--green)")}
          </div>
          <div style="text-align:right">
            <div style="font-size:.82rem">${fmtM(c.revenue)}</div>
            <div style="font-size:.7rem;color:var(--text2)">${c.visitas} visitas</div>
          </div>
        </div>`).join("")||"<div style='color:var(--text2)'>Sin datos</div>"}
    </div>

    <!-- R12: Clientes en riesgo de pérdida -->
    <div class="card">
      <div class="card-title">12. Clientes sin visita — últimos 30 días ⚠️</div>
      <div class="card-sub">Candidatos para campaña de reactivación (${d.sinVisita30.length} clientes)</div>
      ${d.sinVisita30.length?
        `<div class="table-wrap"><table>
          <thead><tr><th>Cliente</th><th>Teléfono</th><th>Última visita</th></tr></thead>
          <tbody>
          ${d.sinVisita30.slice(0,10).map(c=>{
            const ultI=STATE.ingresos.filter(i=>i.clienteId===c.id).sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
            return `<tr>
              <td><strong>${c.nombre}</strong></td>
              <td>${c.telefono||"—"}</td>
              <td style="font-size:.78rem;color:var(--red)">${ultI?.fecha||"Nunca"}</td>
            </tr>`;
          }).join("")}
          </tbody>
        </table></div>`:
        `<div class="empty"><p>✅ Todos los clientes visitaron recientemente</p></div>`}
    </div>

    <!-- R13: Frecuencia promedio de visita -->
    <div class="card">
      <div class="card-title">13. Frecuencia promedio de visita</div>
      ${(()=>{
        const freqs=STATE.clientes.map(c=>{
          const vis=STATE.ingresos.filter(i=>i.clienteId===c.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
          if(vis.length<2) return null;
          let sumDias=0;
          for(let i=1;i<vis.length;i++){
            sumDias+=(new Date(vis[i].fecha)-new Date(vis[i-1].fecha))/86400000;
          }
          return sumDias/(vis.length-1);
        }).filter(Boolean);
        const prom=freqs.length?freqs.reduce((s,f)=>s+f,0)/freqs.length:0;
        return `
        <div style="text-align:center;padding:1rem">
          <div style="font-size:2.5rem;font-weight:800;color:var(--accent)">${Math.round(prom)}</div>
          <div style="font-size:.85rem;color:var(--text2)">días promedio entre visitas</div>
          <div style="font-size:.78rem;color:var(--text2);margin-top:.5rem">Basado en ${freqs.length} clientes con 2+ visitas</div>
        </div>`;
      })()}
    </div>
  </div>

  <!-- ══ SECCIÓN EMPLEADOS ══ -->
  <div style="font-size:.78rem;font-weight:800;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin:1.25rem 0 .75rem">
    👨‍💼 Análisis de Empleados
  </div>
  <div class="two-col" style="align-items:start">

    <!-- R14: Ventas por empleado -->
    <div class="card">
      <div class="card-title">14. Rendimiento por empleado</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Empleado</th><th>Visitas</th><th>Revenue</th><th>Comisión</th></tr></thead>
        <tbody>
        ${Object.values(d.porEmp).sort((a,b)=>b.revenue-a.revenue).map(e=>`<tr>
          <td><strong>${e.nombre}</strong></td>
          <td class="amt-blue">${e.qty}</td>
          <td class="amt-green">${fmtM(e.revenue)}</td>
          <td class="amt-accent">${fmtM(e.comision)}</td>
        </tr>`).join("")||"<tr><td colspan='4' style='text-align:center;color:var(--text2)'>Sin datos</td></tr>"}
        </tbody>
      </table></div>
    </div>

    <!-- R15: Comisiones acumuladas -->
    <div class="card">
      <div class="card-title">15. Comisiones acumuladas en el período</div>
      ${Object.values(d.porEmp).sort((a,b)=>b.comision-a.comision).map(e=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.85rem">
          <span>${e.nombre}</span>
          <span class="amt-accent" style="font-weight:700">${fmtM(e.comision)}</span>
        </div>`).join("")||"<div style='color:var(--text2)'>Sin datos</div>"}
      <div style="display:flex;justify-content:space-between;font-weight:800;padding:.5rem 0;font-size:.9rem">
        <span>Total a pagar:</span>
        <span style="color:var(--accent)">${fmtM(Object.values(d.porEmp).reduce((s,e)=>s+e.comision,0))}</span>
      </div>
    </div>

    <!-- R16: Productividad por empleado -->
    <div class="card">
      <div class="card-title">16. Ticket promedio por empleado</div>
      ${Object.values(d.porEmp).sort((a,b)=>b.revenue-a.revenue).map(e=>{
        const ticket=e.qty>0?e.revenue/e.qty:0;
        return `<div style="display:flex;align-items:center;gap:.5rem;margin:.35rem 0">
          <span style="flex:1;font-size:.82rem">${e.nombre}</span>
          ${bar(ticket,maxEmp,"var(--purple)")}
          <span style="font-size:.78rem;min-width:60px;text-align:right">${fmtM(ticket)}</span>
        </div>`;
      }).join("")||"<div style='color:var(--text2)'>Sin datos</div>"}
    </div>
  </div>

  <!-- ══ SECCIÓN FINANCIERO ══ -->
  <div style="font-size:.78rem;font-weight:800;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin:1.25rem 0 .75rem">
    💰 Análisis Financiero
  </div>
  <div class="two-col" style="align-items:start">

    <!-- R17: P&L simplificado -->
    <div class="card">
      <div class="card-title">17. Estado de Resultados (P&L)</div>
      ${[
        ["Ingresos brutos", d.totalIng, "green"],
        ["Total gastos", -d.totalGas, "red"],
        ["Utilidad bruta", d.utilidad, d.utilidad>=0?"green":"red"]
      ].map(([label,val,color])=>`
        <div style="display:flex;justify-content:space-between;padding:.5rem 0;
          border-bottom:1px solid var(--border);font-size:.85rem;
          ${label==="Utilidad bruta"?"font-weight:800;font-size:.95rem":""}">
          <span>${label}</span>
          <span class="c-${color}">${val<0?"-":"+"}${fmtM(Math.abs(val))}</span>
        </div>`).join("")}
      <div style="text-align:center;margin-top:.75rem;font-size:.82rem;color:var(--text2)">
        Margen neto: <strong class="${d.utilidad>=0?"c-green":"c-red"}">${d.totalIng>0?(d.utilidad/d.totalIng*100).toFixed(1):0}%</strong>
      </div>
    </div>

    <!-- R18: Gastos por categoría -->
    <div class="card">
      <div class="card-title">18. Gastos por categoría</div>
      ${(()=>{
        const maxG=Math.max(...Object.values(d.porCatGas),1);

          <div style="display:flex;align-items:center;gap:.5rem;margin:.35rem 0">

        ${(()=>{
          const fechas=[...new Set([...d.ings.map(i=>i.fecha),...d.gas.map(g=>g.fecha)])].sort().reverse();
          return fechas.slice(0,20).map(f=>{
            const ing=d.ings.filter(i=>i.fecha===f).reduce((s,i)=>s+i.total,0);
            const gas=d.gas.filter(g=>g.fecha===f).reduce((s,g)=>s+g.monto,0);
            const neto=ing-gas;
            return `<tr>
              <td style="font-size:.78rem">${f}</td>
              <td class="amt-green">${fmtM(ing)}</td>
              <td class="amt-red">${fmtM(gas)}</td>
              <td class="${neto>=0?"amt-green":"amt-red"}" style="font-weight:700">${fmtM(neto)}</td>
            </tr>`;
          }).join("")||"<tr><td colspan='4' style='text-align:center;color:var(--text2)'>Sin datos</td></tr>";
        })()}

    <div class="card">

    </div>

    <!-- R23: Hora pico resumen -->
    <div class="card">
      <div class="card-title">23. Resumen operacional — Hora pico</div>
      ${(()=>{
        const horaMax=d.porHora.indexOf(Math.max(...d.porHora));
        const diaMax=d.porDia.indexOf(Math.max(...d.porDia));
        const prodTop=d.topProds[0];
        const empTop=Object.values(d.porEmp).sort((a,b)=>b.revenue-a.revenue)[0];
        return `
        <div style="display:flex;flex-direction:column;gap:.5rem;margin-top:.25rem">
          ${[
            ["⏰ Hora pico", `${horaMax}:00 — ${fmtM(d.porHora[horaMax])}`],
            ["📅 Día más rentable", `${d.dias[diaMax]} — ${fmtM(d.porDia[diaMax])}`],
            ["🏆 Producto líder", prodTop?`${prodTop.nombre} (${fmtM(prodTop.revenue)})` : "—"],
            ["👤 Empleado top", empTop?`${empTop.nombre} (${fmtM(empTop.revenue)})` : "—"],
            ["🎯 Ticket promedio", fmtM(d.ticketProm)],
            ["📈 Margen neto", `${d.totalIng>0?(d.utilidad/d.totalIng*100).toFixed(1):0}%`],
          ].map(([k,v])=>`
            <div style="display:flex;justify-content:space-between;padding:.35rem 0;

function attachRolesEvents(){
  const showForm=(show=true,id=null)=>{
    const f=$("formRol"); if(f) f.style.display=show?"block":"none";
    if(!show) return;
    // Limpiar
    $("rolNombre").value=""; $("rolColor").value="blue"; $("rolEditId").value="";
    $$(".rol-mod-check").forEach(c=>c.checked=false);
    if(id){
      const rol=STATE.roles.find(r=>r.id===id); if(!rol) return;
      $("formRolTitle").textContent="Editar Rol";
      $("rolNombre").value=rol.nombre; $("rolColor").value=rol.color||"blue"; $("rolEditId").value=id;
      $$(".rol-mod-check").forEach(c=>c.checked=(rol.modulos||[]).includes(c.value));
    } else {
      $("formRolTitle").textContent="Nuevo Rol";
    }
    f.scrollIntoView({behavior:"smooth"});
  };

  $("btnNuevoRol")?.addEventListener("click",()=>showForm(true));
  $("btnCancelarRol")?.addEventListener("click",()=>showForm(false));

  $("btnGuardarRol")?.addEventListener("click",()=>{
    const nombre=$("rolNombre")?.value.trim();
    if(!nombre) return toast("⚠️ Ingresa un nombre para el rol","warn");
    const modulos=[...$$("#formRol .rol-mod-check")].filter(c=>c.checked).map(c=>c.value);
    if(!modulos.length) return toast("⚠️ Selecciona al menos un módulo","warn");
    const color=$("rolColor")?.value||"blue";
    const editId=$("rolEditId")?.value;
    if(editId){
      const rol=STATE.roles.find(r=>r.id===editId);
      if(rol){ rol.nombre=nombre; rol.modulos=modulos; rol.color=color; }
    } else {
      STATE.roles.push({id:"r"+Date.now(),nombre,modulos,color,esAdmin:false});
    }
    saveAll(); fbSave("roles",STATE.roles);
    toast("✅ Rol guardado","ok"); goTab("roles");
  });

  $$("[data-action='editRol']").forEach(b=>b.addEventListener("click",()=>showForm(true,b.dataset.id)));

  $$("[data-action='delRol']").forEach(b=>b.addEventListener("click",()=>{
    const id=b.dataset.id;
    const usandoRol=STATE.usuarios.filter(u=>u.role===STATE.roles.find(r=>r.id===id)?.nombre);
    if(usandoRol.length>0) return toast(`⚠️ ${usandoRol.length} usuario(s) tienen este rol. Reasígnalos primero.`,"err",4000);
    if(confirm2("¿Eliminar este rol?")){
      STATE.roles=STATE.roles.filter(r=>r.id!==id);
      saveAll(); fbSave("roles",STATE.roles);
      toast("🗑️ Rol eliminado"); goTab("roles");
    }
  }));
}

          ${STATE.config.direccion?`<div style="font-size:.72rem">${STATE.config.direccion}</div>`:""}
          ${STATE.config.telefono?`<div style="font-size:.72rem">Tel: ${STATE.config.telefono}</div>`:""}
          ${STATE.config.nit?`<div style="font-size:.72rem">NIT: ${STATE.config.nit}</div>`:""}
          ${STATE.config.registroIVA?`<div style="font-size:.72rem">Reg. IVA: ${STATE.config.registroIVA}</div>`:""}
          <div style="font-size:.72rem">${suc?.nombre||""}</div>
          <div style="margin-top:.4rem;border-top:1px dashed #ccc;padding-top:.4rem">
            <div style="font-size:.72rem">No. Correlativo: <strong>${correlativo}</strong></div>
            <div style="font-size:.72rem">${ref.fecha} ${ref.hora||""}</div>
          </div>
        </div>
        ${cli?`<div class="ticket-row"><span>Cliente:</span><span>${cli.nombre}</span></div>`:"<div class='ticket-row'><span>Cliente:</span><span>Consumidor Final</span></div>"}
        ${emp?`<div class="ticket-row"><span>Atendió:</span><span>${emp.nombre||emp.username}</span></div>`:""}
        <div style="margin:.5rem 0;border-top:1px dashed #ccc;border-bottom:1px dashed #ccc;padding:.5rem 0">
          ${lineas}
        </div>
        ${ivaAmt>0?`

        <div class="ticket-row" style="font-size:.78rem;color:#555"><span>IVA (${STATE.config.ivaPct}%)</span><span>${fmtMoney(ivaAmt)}</span></div>`:""}

// Generar link de cobro PayPal
function pagarConPaypal(monto, visitaId){
  const email=STATE.config.paypalEmail;
  const nombre=encodeURIComponent(STATE.config.paypalNombre||STATE.config.nombreNegocio);
  const montoFmt=Number(monto).toFixed(2);
  const ref=encodeURIComponent("Visita "+visitaId);
  const url=`https://www.paypal.com/paypalme/${email.replace("@","_")}/${montoFmt}`;
  // Abrir en nueva pestaña
  window.open(url,"_blank");
  // Generar link para WhatsApp
  const waMsg=encodeURIComponent(`💳 Pago por tu visita en ${STATE.config.nombreNegocio}
Total: $${montoFmt}
Paga aquí: ${url}`);
  const waUrl=`https://wa.me/?text=${waMsg}`;
  setTimeout(()=>window.open(waUrl,"_blank"),500);
  toast("💳 Link de pago generado y enviado a WhatsApp","ok",3000);
}

// ── VENTAS ──
function attachVentasEvents(){
  if(!STATE._items) STATE._items=[];

  // ── Lector USB: captura Enter del lector automático ──
  const barcodeInput = document.getElementById("barcodeInput");
  let _barcodeBuffer="", _barcodeTimer=null;
  if(barcodeInput){
    barcodeInput.focus();
    barcodeInput.addEventListener("keydown", e=>{
      if(e.key==="Enter"){
        const codigo=barcodeInput.value.trim();
        barcodeInput.value="";
        if(codigo){
          const modoAjuste=document.getElementById("modoAjusteWrap")?.style.display!=="none";
          if(modoAjuste){
            const cant=parseInt(document.getElementById("ajusteCant")?.value)||1;
            quitarStockPorCodigo(codigo,cant);
          } else {
            if(agregarAlCarritoPorCodigo(codigo)) refrescarItems();
          }
        }
      }
    });
  }

  // ── Cámara toggle ──
  document.getElementById("btnToggleCamera")?.addEventListener("click",async()=>{
    const wrap=document.getElementById("cameraWrap");
    if(!wrap) return;
    if(wrap.style.display==="none"){
      wrap.style.display="block";
      let lastScan="", lastScanTime=0;
      await iniciarScanner("scannerVideo", codigo=>{
        const now=Date.now();
        if(codigo===lastScan&&now-lastScanTime<2000) return; // evitar doble scan
        lastScan=codigo; lastScanTime=now;
        if(agregarAlCarritoPorCodigo(codigo)) refrescarItems();
      });
    } else {
      wrap.style.display="none";
      await detenerScanner();
    }
  });
  document.getElementById("btnStopCamera")?.addEventListener("click",async()=>{
    document.getElementById("cameraWrap").style.display="none";
    await detenerScanner();
  });

  // ── Modo ajuste inventario ──
  document.getElementById("btnModoAjuste")?.addEventListener("click",()=>{
    const w=document.getElementById("modoAjusteWrap");
    if(w) w.style.display=w.style.display==="none"?"block":"none";
  });
  document.getElementById("btnAjustarStock")?.addEventListener("click",()=>{
    const codigo=document.getElementById("ajusteCodigo")?.value.trim();
    const cant=parseInt(document.getElementById("ajusteCant")?.value)||1;
    if(!codigo) return toast("⚠️ Ingresa un código","warn");
    quitarStockPorCodigo(codigo,cant);
    if(document.getElementById("ajusteCodigo")) document.getElementById("ajusteCodigo").value="";
  });

  // ── Calcular subtotal fila de agregar ──
  const calcFila=()=>{
    const vProd=$("vProd"), vCant=$("vCant"), vDesc=$("vDesc"), vPrecio=$("vPrecio"), vTotal=$("vTotal");
    const prod=STATE.productos.find(p=>p.id==vProd?.value);
    if(!prod){ if(vPrecio)vPrecio.value=""; if(vTotal)vTotal.value=""; return; }
    const cant=parseInt(vCant?.value)||0;
    const desc=parseFloat(vDesc?.value)||0;
    const sub=prod.precio*cant-desc;
    if(vPrecio) vPrecio.value=fmtMoney(prod.precio);
    if(vTotal) vTotal.value=cant>0?fmtMoney(sub):"—";
  };
  $("vProd")?.addEventListener("change",calcFila);
  $("vCant")?.addEventListener("input",calcFila);
  $("vDesc")?.addEventListener("input",calcFila);
  calcFila();

  // Refrescar el panel de ítems sin recargar tab
  const refrescarItems=()=>{
    const cont=$("itemsContainer"); if(!cont) return;
    if(!STATE._items.length){ cont.innerHTML=`<div style="color:var(--text3);font-size:.83rem;padding:.5rem 0;text-align:center">Sin ítems agregados</div>`; return; }
    let gran=0;
    const rows=STATE._items.map((it,idx)=>{
      const sub=it.precio*it.cant-(it.desc||0); gran+=sub;
      return `<div style="display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--border)">
        <div style="flex:2;font-weight:600;font-size:.88rem">${it.nombre}</div>
        <div style="flex:1;font-size:.82rem;color:var(--text2)">${fmtMoney(it.precio)} × ${it.cant}</div>
        ${it.desc?`<div style="font-size:.78rem;color:var(--red)">-${fmtMoney(it.desc)}</div>`:""}
        <div style="font-weight:700;color:var(--green);font-family:var(--mono)">${fmtMoney(sub)}</div>
        <button class="icon-btn item-del" data-idx="${idx}">🗑️</button>
      </div>`;
    }).join("");
    const iva=gran*(STATE.config.ivaPct||0)/100;
    const tot=gran+iva;
    cont.innerHTML=rows+`
      <div style="margin-top:.75rem;padding-top:.5rem;border-top:2px solid var(--border)">
        ${iva>0?`<div style="display:flex;justify-content:space-between;font-size:.82rem;color:var(--text2);margin-bottom:.25rem"><span>IVA ${STATE.config.ivaPct}%</span><span>${fmtMoney(iva)}</span></div>`:""}
        <div style="display:flex;justify-content:space-between;font-size:1.15rem;font-weight:800;color:var(--green)"><span>TOTAL</span><span style="font-family:var(--mono)">${fmtMoney(tot)}</span></div>
      </div>`;
    // Re-attach delete buttons
    cont.querySelectorAll(".item-del").forEach(b=>b.addEventListener("click",()=>{
      STATE._items.splice(parseInt(b.dataset.idx),1);
      refrescarItems();
    }));
  };

  // Botón agregar ítem
  $("btnAgregarItem")?.addEventListener("click",()=>{
    const prod=STATE.productos.find(p=>p.id==$("vProd")?.value);
    const cant=parseInt($("vCant")?.value)||1;
    if(!prod) return toast("⚠️ Selecciona un producto","warn");
    if(cant<=0) return toast("⚠️ Cantidad inválida","warn");
    const stk=getStock(prod.id);
    if(stk!==null&&cant>stk) return toast(`⚠️ Stock insuficiente. Disponible: ${stk}`,"err");
    const desc=parseFloat($("vDesc")?.value)||0;
    STATE._items.push({prodId:prod.id, nombre:prod.nombre, precio:prod.precio, cant, desc});
    // Reset fila
    if($("vCant")) $("vCant").value="1";
    if($("vDesc")) $("vDesc").value="0";
    calcFila();
    refrescarItems();
    toast(`✅ "${prod.nombre}" agregado`,"ok");
  });

  // Limpiar todos los ítems
  $("btnLimpiarItems")?.addEventListener("click",()=>{
    if(!STATE._items.length) return;
    if(confirm2("¿Limpiar todos los ítems?")){ STATE._items=[]; refrescarItems(); }
  });

  // Registrar visita completa
  $("btnRegistrarVisita")?.addEventListener("click",()=>{
    if(!STATE._items.length) return toast("⚠️ Agrega al menos un producto","warn");
    const caja=cajaActiva();
    const cli=$("vCli")?.value;
    const emp=$("vEmp")?.value;
    const metodo=$("vMetodo")?.value||"efectivo";
    const notas=$("vNotas")?.value||"";
    const fecha=today(), hora=nowTime();
    // ID de visita compartido para todos los ítems de esta transacción
    const visitaId="V"+Date.now();
    const correlativo=generarCorrelativo();
    saveAll(); // guardar correlativo actualizado
    const nuevosIds=[];
    // Si no se seleccionó empleado específico, asignar al usuario logueado
    const empId=emp?parseInt(emp):STATE.user.id;
    STATE._items.forEach(it=>{
      const sub=it.precio*it.cant-(it.desc||0);
      const iva=sub*(STATE.config.ivaPct||0)/100;
      const total=sub+iva;
      const ing={
        id:uid("i"), visitaId, correlativo, fecha, hora,
        productoId:it.prodId, cantidad:it.cant,
        precioUnitario:it.precio, descuento:it.desc||0, total,
        metodoPago:metodo,
        clienteId:cli?parseInt(cli):null,
        empleadoId:empId, // FIX: usar empId fijo para toda la visita
        cajaId:caja?.id||null, notas
      };
      STATE.ingresos.push(ing);
      nuevosIds.push(ing.id);
    });
    saveAll();
    const totalVisita=STATE.ingresos.filter(i=>i.visitaId===visitaId).reduce((s,i)=>s+i.total,0);
    toast(`✅ Venta registrada — ${STATE._items.length} ítem(s) — ${fmtMoney(totalVisita)}`,"ok");
    STATE._items=[];
    showTicketVisita(visitaId);
    goTab("ventas");
  });

  // Historial: ticket por visita
  $$("[data-action='ticketVisita']").forEach(b=>b.addEventListener("click",()=>showTicketVisita(b.dataset.vid)));
  // Historial: eliminar visita
  $$("[data-action='delVisita']").forEach(b=>b.addEventListener("click",()=>{
    const vid=b.dataset.vid;
    if(confirm2("¿Eliminar esta venta completa?")){
      STATE.ingresos=STATE.ingresos.filter(i=>(i.visitaId||("v"+i.id))!==vid);
      saveAll(); toast("🗑️ Venta eliminada"); goTab("ventas");
    }
  }));
}

    const citasCliente=STATE.citas.filter(x=>x.clienteId===c.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const rows=compras.sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(i=>{
      const p=STATE.productos.find(pr=>pr.id===i.productoId);
      return `<tr><td>${i.fecha}</td><td>${p?.nombre||"—"}</td><td class="amt-green">${fmtMoney(i.total)}</td></tr>`;

          <div><div style="font-size:.72rem;color:var(--text2)">Email</div><strong>${c.email||"—"}</strong></div>

        </div>

function registrarHistorialWA(cliente, plantilla, citaId=null, tipo=null){
  let h=[]; try{ h=JSON.parse(localStorage.getItem("np_historial_wa")||"[]"); }catch(e){}
  h.unshift({cliente,plantilla,citaId,tipo,fecha:today(),hora:nowTime()});
  if(h.length>50) h.length=50;
  localStorage.setItem("np_historial_wa",JSON.stringify(h));
}

function attachCatalogoEvents(){
  const showForm=(s=true)=>{ const f=$("formProd"); if(f) f.style.display=s?"block":"none"; };
  $("btnNuevoProd")?.addEventListener("click",()=>{
    $("formProdTitle").textContent="Nuevo Producto / Servicio";
    ["pNombre","pPrecio","pCosto","pCat"].forEach(id=>{ const el=$(id); if(el) el.value=""; });
    $("pStock").value="0"; $("pTipo").value="servicio"; $("pEditId").value="";
    showForm();
  });
  $("btnCancelarProd")?.addEventListener("click",()=>showForm(false));
  $("btnGuardarProd")?.addEventListener("click",()=>{
    const nombre=$("pNombre")?.value.trim();
    const precio=parseFloat($("pPrecio")?.value);
    if(!nombre) return toast("⚠️ Nombre requerido","warn");
    if(isNaN(precio)||precio<0) return toast("⚠️ Precio inválido","warn");
    const editId=parseInt($("pEditId")?.value);
    const data={nombre,tipo:$("pTipo").value,precio,costo:parseFloat($("pCosto").value)||0,stockInicial:parseInt($("pStock").value)||0,categoria:$("pCat").value||"",codigoBarras:$("pCodigo")?.value.trim()||""};
    if(editId){ const p=STATE.productos.find(x=>x.id===editId); if(p) Object.assign(p,data); }
    else STATE.productos.push({id:uid("p"),...data});
    saveAll(); toast("✅ Producto guardado","ok"); goTab("catalogo");
  });

  $$("[data-action='editProd']").forEach(b=>b.addEventListener("click",()=>{
    const p=STATE.productos.find(x=>x.id===parseInt(b.dataset.id));
    if(!p) return;
    $("formProdTitle").textContent="Editar Producto";
    $("pNombre").value=p.nombre; $("pTipo").value=p.tipo; $("pPrecio").value=p.precio;
    $("pCosto").value=p.costo||0; $("pStock").value=p.stockInicial||0; $("pCat").value=p.categoria||"";
    if($("pCodigo")) $("pCodigo").value=p.codigoBarras||"";
    $("pEditId").value=p.id;
    showForm(); $("formProd").scrollIntoView({behavior:"smooth"});
  }));

  // Escáner USB para catálogo
  const pCodigoEl=$("pCodigo");
  if(pCodigoEl){
    pCodigoEl.addEventListener("keydown",e=>{
      if(e.key==="Enter"){ e.preventDefault(); toast("✅ Código: "+pCodigoEl.value,"ok",1200); }
    });
  }
  // Cámara para catálogo
  $("btnCamaraCatalogo")?.addEventListener("click",async()=>{
    const wrap=$("cameraCatalogWrap");
    if(!wrap) return;
    if(wrap.style.display==="none"){
      wrap.style.display="block";
      let scanned=false;
      await iniciarScannerCatalogo("scannerCatalog", codigo=>{
        if(scanned) return; scanned=true;
        if(pCodigoEl) pCodigoEl.value=codigo;
        toast("✅ Código escaneado: "+codigo,"ok",1500);
        wrap.style.display="none";
        detenerScannerCatalogo();
      });
    } else {
      wrap.style.display="none";
      detenerScannerCatalogo();
    }
  });
  $("btnStopCamaraCatalogo")?.addEventListener("click",()=>{
    $("cameraCatalogWrap").style.display="none";
    detenerScannerCatalogo();
  });

  $$("[data-action='delProd']").forEach(b=>b.addEventListener("click",()=>{
    const id=parseInt(b.dataset.id);
    if(STATE.ingresos.some(i=>i.productoId===id)&&!confirm2("Este producto tiene ventas. ¿Eliminar igualmente?")) return;
    else if(!STATE.ingresos.some(i=>i.productoId===id)&&!confirm2("¿Eliminar producto?")) return;
    STATE.productos=STATE.productos.filter(p=>p.id!==id); saveAll(); toast("🗑️ Eliminado"); goTab("catalogo");
  }));
}

// ── CONTABILIDAD ──
function attachContabilidadEvents(){
  const filtrar=(mes)=>{
    const movs=[
      ...STATE.ingresos.filter(i=>!mes||i.fecha.startsWith(mes)).map(i=>{const p=STATE.productos.find(pr=>pr.id===i.productoId);return{fecha:i.fecha,tipo:"INGRESO",concepto:p?.nombre||"—",metodo:i.metodoPago||"efectivo",monto:i.total};}),
      ...STATE.gastos.filter(g=>!mes||g.fecha.startsWith(mes)).map(g=>({fecha:g.fecha,tipo:"GASTO",concepto:g.descripcion,metodo:"—",monto:g.monto}))
    ].sort((a,b)=>b.fecha.localeCompare(a.fecha));
    const tbody=$("movBody");
    if(!tbody) return;
    tbody.innerHTML=movs.map(m=>`<tr>
      <td>${m.fecha}</td>
      <td><span class="badge ${m.tipo==="INGRESO"?"bg-green":"bg-red"}">${m.tipo}</span></td>
      <td>${m.concepto}</td><td><span class="badge bg-gray">${m.metodo}</span></td>
      <td class="${m.tipo==="INGRESO"?"amt-green":"amt-red"}">${fmtMoney(m.monto)}</td>
    </tr>`).join("")||`<tr><td colspan="5" style="text-align:center;padding:1rem;color:var(--text2)">Sin movimientos</td></tr>`;
  };
  $("btnFiltrar")?.addEventListener("click",()=>filtrar($("filtroMes")?.value));
  $("btnVerTodo")?.addEventListener("click",()=>{ if($("filtroMes")) $("filtroMes").value=""; filtrar(null); });
}

}

      const cl=STATE.clientes.find(c=>c.id===i.clienteId);
      const emp=STATE.usuarios.find(u=>u.id===i.empleadoId);
      rows.push(`${i.fecha},${i.hora||""},${p?.nombre||"?"},${i.cantidad},${i.precioUnitario},${i.descuento||0},${i.total},${cl?.nombre||""},${emp?.nombre||emp?.username||""},${i.metodoPago||""}`);
    });
    exportCSV(rows.join("\n"),`ventas_${today()}.csv`); toast("📊 CSV exportado","ok");
  });

  $("btnExportCSVGas")?.addEventListener("click",()=>{
    const rows=["Fecha,Descripcion,Categoria,Monto"];
    STATE.gastos.forEach(g=>rows.push(`${g.fecha},${g.descripcion},${g.categoria},${g.monto}`));
    exportCSV(rows.join("\n"),`gastos_${today()}.csv`); toast("📊 CSV exportado","ok");
  });

  // Botones de rango rápido
  $$("[data-rango]").forEach(btn=>btn.addEventListener("click",()=>{
    const hoy=today();
    const d=new Date();
    let desde="", hasta=hoy;
    if(btn.dataset.rango==="hoy"){ desde=hoy; }
    else if(btn.dataset.rango==="semana"){
      const dow=d.getDay(); const lun=new Date(d);
      lun.setDate(d.getDate()-(dow===0?6:dow-1));
      desde=lun.toISOString().slice(0,10);
    }
    else if(btn.dataset.rango==="mes"){ desde=hoy.slice(0,7)+"-01"; }
    else if(btn.dataset.rango==="trimestre"){
      const mes=d.getMonth(); const ini=Math.floor(mes/3)*3;
      desde=`${d.getFullYear()}-${String(ini+1).padStart(2,"0")}-01`;
    }
    else if(btn.dataset.rango==="anio"){ desde=hoy.slice(0,4)+"-01-01"; }
    if($("repDesde")) $("repDesde").value=desde;
    if($("repHasta")) $("repHasta").value=hasta;
    generarReportes(desde, hasta);
  }));

  $("btnGenReporte")?.addEventListener("click",()=>{
    const desde=$("repDesde")?.value||"";
    const hasta=$("repHasta")?.value||today();
    generarReportes(desde, hasta);
  });
}

function generarReportes(desde, hasta){
  const kpis=$("repKpis");
  const all=$("repAllReportes");
  if(!kpis||!all) return;

  const d=calcReporteData(desde, hasta);
  const bar=(val,max,color="var(--accent)")=>{
    const pct=max>0?Math.round(val/max*100):0;
    return `<div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:3px">
      <div style="height:100%;width:${pct}%;background:${color};border-radius:3px"></div></div>`;
  };

  // Actualizar KPIs
  kpis.innerHTML=`
    <div class="stat"><div class="stat-icon">💰</div><div class="stat-label">Ingresos período</div><div class="stat-value c-green">${fmtMoney(d.totalIng)}</div></div>
    <div class="stat"><div class="stat-icon">💸</div><div class="stat-label">Gastos período</div><div class="stat-value c-red">${fmtMoney(d.totalGas)}</div></div>
    <div class="stat"><div class="stat-icon">📈</div><div class="stat-label">Utilidad neta</div><div class="stat-value ${d.utilidad>=0?"c-green":"c-red"}">${fmtMoney(d.utilidad)}</div></div>
    <div class="stat"><div class="stat-icon">🧾</div><div class="stat-label">Ticket promedio</div><div class="stat-value c-accent">${fmtMoney(d.ticketProm)}</div></div>
    <div class="stat"><div class="stat-icon">👥</div><div class="stat-label">Visitas únicas</div><div class="stat-value">${d.visitas.length}</div></div>
    <div class="stat"><div class="stat-icon">📅</div><div class="stat-label">vs mes anterior</div>
      <div class="stat-value ${d.cambioMes>=0?"c-green":"c-red"}">${d.cambioMes>=0?"+":""}${d.cambioMes.toFixed(1)}%</div></div>
    <div class="stat"><div class="stat-icon">🎯</div><div class="stat-label">Proyección 30d</div><div class="stat-value c-blue">${fmtMoney(d.proyeccion30)}</div></div>
    <div class="stat"><div class="stat-icon">🔄</div><div class="stat-label">Conversión citas</div><div class="stat-value">${d.tasaConversion.toFixed(1)}%</div></div>
  `;

  // Actualizar todos los reportes
  all.innerHTML=buildAllReportes(d, bar);
  toast("📊 Reportes actualizados","ok",1500);
}

// Plantillas por defecto
const PLANTILLAS_DEFAULT = [
  { id:"p1", nombre:"Recordatorio 24h", texto:"Hola {nombre} 👋 Te recordamos que mañana tienes una cita en {negocio} a las {hora}. ¡Te esperamos! 📅" },
  { id:"p2", nombre:"Recordatorio 1h",  texto:"Hola {nombre} ⏰ Tu cita en {negocio} es en 1 hora ({hora}). ¡Nos vemos pronto!" },
  { id:"p3", nombre:"Próxima cita",     texto:"Hola {nombre} 😊 Gracias por visitarnos. Tu próxima cita es el {fecha} a las {hora}. ¡Te esperamos en {negocio}!" },
  { id:"p4", nombre:"Confirmación",     texto:"Hola {nombre}, confirmamos tu cita en {negocio} para el {fecha} a las {hora}. Responde 'OK' para confirmar o 'NO' para cancelar." },
];

function getPlantillas(){
  const saved = LS.load("plantillas");
  if(saved && saved.length) return saved;
  // Primera vez: guardar las por defecto en LS para que sean editables
  const defaults = [...PLANTILLAS_DEFAULT];
  savePlantillas(defaults);
  return defaults;
}
function savePlantillas(pl){ LS.save("plantillas", pl); }

function aplicarPlantilla(texto, clienteId, citaId){
  const c = STATE.clientes.find(x=>x.id===clienteId)||{nombre:"Cliente"};
  const cita = STATE.citas.find(x=>x.id===citaId)||{};
  return texto
    .replace(/{nombre}/g, c.nombre)
    .replace(/{negocio}/g, STATE.config.nombreNegocio)
    .replace(/{hora}/g, cita.hora||"")
    .replace(/{fecha}/g, cita.fecha||"")
    .replace(/{servicio}/g, cita.titulo||"");
}

// Genera link SMS nativo
function linkWA(telefono, mensaje){
  let num = (telefono||"").replace(/\D/g,"");
  if(num.length <= 8) num = "503" + num;
  const txt = encodeURIComponent(mensaje);
  return `https://wa.me/${num}?text=${txt}`;
}

// Verifica recordatorios pendientes al iniciar sesión
let _reminderTimer = null;
function iniciarMotorRecordatorios(){
  verificarRecordatorios();
  if(_reminderTimer) clearInterval(_reminderTimer);
  _reminderTimer = setInterval(verificarRecordatorios, 60000); // cada minuto
}

function verificarRecordatorios(){
  const ahora = new Date();
  const hoy = today();
  const horaActual = ahora.getHours()*60 + ahora.getMinutes();

  // IDs ya descartados en esta sesión
  const descartados = JSON.parse(sessionStorage.getItem("rem_descartados")||"[]");

  const pendientes = [];

  STATE.citas.forEach(cita => {
    if(!cita.clienteId || !cita.hora) return;
    if(descartados.includes("rem_"+cita.id+"_24") && descartados.includes("rem_"+cita.id+"_1")) return;

    const [hh,mm] = cita.hora.split(":").map(Number);
    const citaFecha = new Date(cita.fecha+"T"+cita.hora+":00");
    const diffMs = citaFecha - ahora;
    const diffMin = diffMs / 60000;

    // 24h antes: entre 23h y 25h de anticipación
    if(diffMin > 0 && diffMin <= 1500 && diffMin >= 1380 && !descartados.includes("rem_"+cita.id+"_24")){
      pendientes.push({ cita, tipo:"24h", key:"rem_"+cita.id+"_24", urgente:false });
    }
    // 1h antes: entre 50min y 70min de anticipación
    if(diffMin > 0 && diffMin <= 70 && diffMin >= 50 && !descartados.includes("rem_"+cita.id+"_1")){
      pendientes.push({ cita, tipo:"1h", key:"rem_"+cita.id+"_1", urgente:true });
    }
  });

  mostrarBannerRecordatorios(pendientes);
}

function mostrarBannerRecordatorios(items){
  // Limpiar banner anterior
  let banner = $("reminderBanner");
  if(!banner){
    banner = document.createElement("div");
    banner.id = "reminderBanner";
    banner.className = "reminder-banner";
    document.body.appendChild(banner);
  }
  // Solo agregar los nuevos (no duplicar)
  const yaShown = [...banner.querySelectorAll("[data-remkey]")].map(el=>el.dataset.remkey);

  items.forEach(item => {
    if(yaShown.includes(item.key)) return;
    const c = STATE.clientes.find(x=>x.id===item.cita.clienteId);
    const nombre = c?.nombre||"Cliente";
    const label = item.tipo==="24h" ? "Mañana" : "En 1 hora";
    const el = document.createElement("div");
    el.className = "reminder-item"+(item.urgente?" urgent":"");
    el.dataset.remkey = item.key;
    el.innerHTML = `
      <div class="reminder-dot ${item.urgente?"urgent":""}"></div>
      <div style="flex:1">
        <strong>⏰ Recordatorio ${item.tipo}</strong> —
        <strong>${nombre}</strong> tiene cita <strong>${label}</strong> (${item.cita.fecha} ${item.cita.hora}) · ${item.cita.titulo}
      </div>
      ${c?.telefono?`<button class="btn btn-primary btn-xs" onclick="enviarRecordatorioRapido(${item.cita.id},'${item.tipo}')">💬 WhatsApp</button>`:"<span style='font-size:.72rem;color:var(--text2)'>Sin teléfono</span>"}
      <button class="reminder-dismiss" data-remkey="${item.key}">✕</button>
    `;
    banner.appendChild(el);
    el.querySelector(".reminder-dismiss").addEventListener("click", ()=>{
      const desc = JSON.parse(sessionStorage.getItem("rem_descartados")||"[]");
      desc.push(item.key);
      sessionStorage.setItem("rem_descartados", JSON.stringify(desc));
      el.remove();
    });
  });

  // Mover main si hay banners
  const count = banner.children.length;
  const mc = $("mainContent");
  if(mc) mc.style.paddingTop = count > 0 ? (count*52+32)+"px" : "";
}

function enviarRecordatorioRapido(citaId, tipo){
  const cita = STATE.citas.find(c=>c.id===citaId);
  if(!cita||!cita.clienteId) return;
  const cli = STATE.clientes.find(c=>c.id===cita.clienteId);
  if(!cli?.telefono) return toast("⚠️ Cliente sin teléfono registrado","warn");
  const plantillas = getPlantillas();
  const plantilla = tipo==="1h" ? plantillas[1] : plantillas[0];
  const msg = aplicarPlantilla(plantilla.texto, cli.id, citaId);
  window.open(linkWA(cli.telefono, msg));
}

//  PWA — REGISTRO DEL SERVICE WORKER
// ════════════════════════════════════════════════════════════
if("serviceWorker" in navigator){
  window.addEventListener("load", async ()=>{
    try{
      const reg = await navigator.serviceWorker.register("sw.js", { scope: "/business-pro/" });
      console.log("[PWA] Service Worker registrado:", reg.scope);

      // Detectar actualización disponible
      reg.addEventListener("updatefound", ()=>{
        const newSW = reg.installing;
        newSW.addEventListener("statechange", ()=>{
          if(newSW.state==="installed" && navigator.serviceWorker.controller){
            toast("🔄 Actualización disponible — recarga la página","ok",5000);
          }
        });
      });
    } catch(e){
      console.warn("[PWA] Service Worker no registrado:", e.message);
    }
  });
}

// Detectar si está instalada como PWA
const esPWA = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
if(esPWA) console.log("[PWA] Ejecutándose como app instalada");

// Detectar cuando vuelve la conexión
window.addEventListener("online",  ()=>{ toast("✅ Conexión restaurada","ok"); saveAll(); });
window.addEventListener("offline", ()=>{ toast("⚠️ Sin conexión — trabajando offline","warn",4000); });

// ════════════════════════════════════════════════════════════
//  INICIO
// ════════════════════════════════════════════════════════════
loadAll();
renderApp();
</script>
</body>
</html>
