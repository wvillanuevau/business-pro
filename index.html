function showTicket(ingresoId){
  const ing=STATE.ingresos.find(i=>i.id===ingresoId);
  if(!ing) return;
  const prod=STATE.productos.find(p=>p.id===ing.productoId);
  const cli=STATE.clientes.find(c=>c.id===ing.clienteId);
  const emp=STATE.usuarios.find(u=>u.id===ing.empleadoId);
  const subtotal=ing.precioUnitario*ing.cantidad;
  const iva=subtotal*(STATE.config.ivaPct||0)/100;
  const desc=ing.descuento||0;

  const html=`<div class="modal-bg" id="modalTicket">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><div class="modal-title">🧾 Recibo de Venta</div><button class="modal-close" id="btnCerrarTicket">✕</button></div>
      <div class="ticket">
        <div class="ticket-header">
          <div style="font-size:1rem;font-weight:700">${STATE.config.nombreNegocio}</div>
          <div>${STATE.sucursales.find(s=>s.id===STATE.config.sucursalActiva)?.nombre||""}</div>
          <div style="margin-top:.5rem">${ing.fecha} ${ing.hora||""}</div>
          <div>Recibo #${String(ing.id).padStart(6,"0")}</div>
        </div>
        ${cli?`<div class="ticket-row"><span>Cliente:</span><span>${cli.nombre}</span></div>`:""}
        ${emp?`<div class="ticket-row"><span>Atendido por:</span><span>${emp.nombre||emp.username}</span></div>`:""}
        <div style="margin:.5rem 0;border-top:1px dashed #ccc;border-bottom:1px dashed #ccc;padding:.5rem 0">
          <div class="ticket-row"><span>${prod?.nombre||"Producto"}</span></div>
          <div class="ticket-row"><span>${ing.cantidad} x ${fmtMoney(ing.precioUnitario)}</span><span>${fmtMoney(subtotal)}</span></div>
          ${desc>0?`<div class="ticket-row"><span>Descuento</span><span>-${fmtMoney(desc)}</span></div>`:""}
          ${iva>0?`<div class="ticket-row"><span>IVA (${STATE.config.ivaPct}%)</span><span>${fmtMoney(iva)}</span></div>`:""}
        </div>
        <div class="ticket-total ticket-row"><span>TOTAL</span><span>${fmtMoney(ing.total)}</span></div>
        <div class="ticket-row"><span>Método:</span><span>${ing.metodoPago||"efectivo"}</span></div>
        ${ing.notas?`<div style="margin-top:.5rem;font-size:.7rem;color:#666">Nota: ${ing.notas}</div>`:""}
        <div class="ticket-footer">¡Gracias por su preferencia!</div>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:1rem;justify-content:center" class="no-print">
        <button class="btn btn-primary btn-sm" onclick="window.print()">🖨️ Imprimir</button>
        <button class="btn btn-ghost btn-sm" id="btnCerrarTicket2">Cerrar</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend",html);
  $("modalTicket")?.addEventListener("click",e=>{ if(e.target.id==="modalTicket") $("modalTicket").remove(); });
  $("btnCerrarTicket")?.addEventListener("click",()=>$("modalTicket").remove());
  $("btnCerrarTicket2")?.addEventListener("click",()=>$("modalTicket").remove());
}

// Ticket multi-ítem por visita
function showTicketVisita(visitaId){
  const items=STATE.ingresos.filter(i=>(i.visitaId||("v"+i.id))===visitaId);
  if(!items.length) return;
  const ref=items[0];
  const cli=STATE.clientes.find(c=>c.id===ref.clienteId);
  // FIX: usar el empleadoId real de la visita (guardado en ref), no el usuario activo
  const empId = ref.empleadoId;
  const emp=STATE.usuarios.find(u=>u.id===empId);
  const totalBruto=items.reduce((s,i)=>s+i.precioUnitario*i.cantidad-(i.descuento||0),0);
  const ivaAmt=totalBruto*(STATE.config.ivaPct||0)/100;
  const totalVisita=items.reduce((s,i)=>s+i.total,0);
  // Usar correlativo guardado en la visita, o generar referencia
  const correlativo=ref.correlativo||`${STATE.config.prefijoDTE||"RBS"}-${ref.fecha?.replace(/-/g,"")}-${String(ref.id).padStart(4,"0")}`;
  const suc=STATE.sucursales.find(s=>s.id===STATE.config.sucursalActiva);

  const lineas=items.map(i=>{
    const p=STATE.productos.find(pr=>pr.id===i.productoId);
    const sub=i.precioUnitario*i.cantidad;
    return `<div class="ticket-row"><span>${p?.nombre||"?"}</span><span class="amt">${fmtMoney(sub)}</span></div>
    <div class="ticket-row" style="font-size:.7rem;color:#777"><span>  ${i.cantidad} × ${fmtMoney(i.precioUnitario)}</span></div>
    ${i.descuento>0?`<div class="ticket-row" style="font-size:.72rem;color:#c00"><span>  Descuento</span><span>-${fmtMoney(i.descuento)}</span></div>`:""}`;
  }).join("");

  const html=`<div class="modal-bg" id="modalTicket">
    <div class="modal" style="max-width:400px">
      <div class="modal-header"><div class="modal-title">🧾 Comprobante de Venta</div><button class="modal-close" id="btnCerrarTicket">✕</button></div>
      <div class="ticket">
        <div class="ticket-header">
          <div style="font-size:1.05rem;font-weight:700;text-transform:uppercase">${STATE.config.nombreNegocio}</div>
          ${STATE.config.direccion?`<div style="font-size:.72rem">${STATE.config.direccion}</div>`:""}
          ${STATE.config.telefono?`<div style="font-size:.72rem">Tel: ${STATE.config.telefono}</div>`:""}
          ${STATE.config.nit?`<div style="font-size:.72rem">NIT: ${STATE.config.nit}</div>`:""}
          ${STATE.config.registroIVA?`<div style="font-size:.72rem">Reg. IVA: ${STATE.config.registroIVA}</div>`:""}
          <div style="font-size:.72rem">${suc?.nombre||""}</div>
          <div style="margin-top:.4rem;border-top:1px dashed #ccc;padding-top:.4rem">
            <div style="font-size:.72rem">No. Correlativo: <strong>${correlativo}</strong></div>
            <div style="font-size:.72rem">${ref.fecha} ${ref.hora||""}</div>
          </div>
        </div>
        ${cli?`<div class="ticket-row"><span>Cliente:</span><span>${cli.nombre}</span></div>`:"<div class='ticket-row'><span>Cliente:</span><span>Consumidor Final</span></div>"}
        ${emp?`<div class="ticket-row"><span>Atendió:</span><span>${emp.nombre||emp.username}</span></div>`:""}
        <div style="margin:.5rem 0;border-top:1px dashed #ccc;border-bottom:1px dashed #ccc;padding:.5rem 0">
          ${lineas}
        </div>
        ${ivaAmt>0?`
        <div class="ticket-row" style="font-size:.78rem;color:#555"><span>Subtotal (sin IVA)</span><span>${fmtMoney(totalBruto-ivaAmt)}</span></div>
        <div class="ticket-row" style="font-size:.78rem;color:#555"><span>IVA (${STATE.config.ivaPct}%)</span><span>${fmtMoney(ivaAmt)}</span></div>`:""}
        <div class="ticket-total ticket-row"><span>TOTAL</span><span>${fmtMoney(totalVisita)}</span></div>
        <div class="ticket-row"><span>Método de pago:</span><span>${ref.metodoPago||"efectivo"}</span></div>
        ${ref.notas?`<div style="margin-top:.4rem;font-size:.7rem;color:#666">Nota: ${ref.notas}</div>`:""}
        <div class="ticket-footer">
          ¡Gracias por su preferencia!<br>
          <span style="font-size:.65rem;color:#999">Comprobante interno de control — No válido como Documento Tributario Electrónico (DTE)</span>
        </div>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:1rem;justify-content:center;flex-wrap:wrap" class="no-print">
        <button class="btn btn-primary btn-sm" onclick="window.print()">🖨️ Imprimir</button>
        ${STATE.config.paypalEmail?`<button class="btn btn-sm paypal-chip" onclick="pagarConPaypal(${totalVisita},'${visitaId}')">💳 Cobrar por PayPal</button>`:""}
        <button class="btn btn-ghost btn-sm" id="btnCerrarTicket2">Cerrar</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend",html);
  $("modalTicket")?.addEventListener("click",e=>{ if(e.target.id==="modalTicket") $("modalTicket").remove(); });
  $("btnCerrarTicket")?.addEventListener("click",()=>$("modalTicket").remove());
  $("btnCerrarTicket2")?.addEventListener("click",()=>$("modalTicket").remove());
}

// Generar link de cobro PayPal
function pagarConPaypal(monto, visitaId){
  const email=STATE.config.paypalEmail;
  const nombre=encodeURIComponent(STATE.config.paypalNombre||STATE.config.nombreNegocio);
  const montoFmt=Number(monto).toFixed(2);
  const ref=encodeURIComponent("Visita "+visitaId);
  const url=`https://www.paypal.com/paypalme/${email.replace("@","_")}/${montoFmt}`;
  // Abrir en nueva pestaña
  window.open(url,"_blank");
  // Generar link para WhatsApp
  const waMsg=encodeURIComponent(`💳 Pago por tu visita en ${STATE.config.nombreNegocio}
Total: $${montoFmt}
Paga aquí: ${url}`);
  const waUrl=`https://wa.me/?text=${waMsg}`;
  setTimeout(()=>window.open(waUrl,"_blank"),500);
  toast("💳 Link de pago generado y enviado a WhatsApp","ok",3000);
}

// ════════════════════════════════════════════════════════════
//  EVENTOS POR TAB
// ════════════════════════════════════════════════════════════
function attachTabEvents(tab){
  if(tab==="caja") attachCajaEvents();
  else if(tab==="ventas") attachVentasEvents();
  else if(tab==="clientes") attachClientesEvents();
  else if(tab==="catalogo") attachCatalogoEvents();
  else if(tab==="gastos") attachGastosEvents();
  else if(tab==="agenda") attachAgendaEvents();
  else if(tab==="whatsapp") attachRecordatoriosEvents();
  else if(tab==="contabilidad") attachContabilidadEvents();
  else if(tab==="reportes") attachReportesEvents();
  else if(tab==="empleados") attachEmpleadosEvents();
  else if(tab==="usuarios") attachUsuariosEvents();
  else if(tab==="sucursales") attachSucursalesEvents();
  else if(tab==="configuracion") attachConfigEvents();
}

// ── CAJA ──
function attachCajaEvents(){
  $("btnAbrirCaja")?.addEventListener("click",()=>{
    const monto=parseFloat($("cajaInicial").value)||0;
    const nuevaCaja={id:uid("ca"),fecha:today(),horaApertura:nowTime(),montoInicial:monto,estado:"abierta",sucursalId:STATE.config.sucursalActiva};
    STATE.cajas.push(nuevaCaja); saveAll(); toast("🔓 Caja abierta","ok"); goTab("caja");
  });
  $("btnCerrarCaja")?.addEventListener("click",()=>{
    const caja=cajaActiva();
    if(!caja||!confirm2("¿Cerrar caja?")) return;
    caja.estado="cerrada"; caja.horaCierre=nowTime();
    saveAll(); toast("🔒 Caja cerrada","ok"); goTab("caja");
  });
}

// ── VENTAS ──
function attachVentasEvents(){
  if(!STATE._items) STATE._items=[];

  // ── Lector USB: captura Enter del lector automático ──
  const barcodeInput = document.getElementById("barcodeInput");
  let _barcodeBuffer="", _barcodeTimer=null;
  if(barcodeInput){
    barcodeInput.focus();
    barcodeInput.addEventListener("keydown", e=>{
      if(e.key==="Enter"){
        const codigo=barcodeInput.value.trim();
        barcodeInput.value="";
        if(codigo){
          const modoAjuste=document.getElementById("modoAjusteWrap")?.style.display!=="none";
          if(modoAjuste){
            const cant=parseInt(document.getElementById("ajusteCant")?.value)||1;
            quitarStockPorCodigo(codigo,cant);
          } else {
            if(agregarAlCarritoPorCodigo(codigo)) refrescarItems();
          }
        }
      }
    });
  }

  // ── Cámara toggle ──
  document.getElementById("btnToggleCamera")?.addEventListener("click",async()=>{
    const wrap=document.getElementById("cameraWrap");
    if(!wrap) return;
    if(wrap.style.display==="none"){
      wrap.style.display="block";
      let lastScan="", lastScanTime=0;
      await iniciarScanner("scannerVideo", codigo=>{
        const now=Date.now();
        if(codigo===lastScan&&now-lastScanTime<2000) return; // evitar doble scan
        lastScan=codigo; lastScanTime=now;
        if(agregarAlCarritoPorCodigo(codigo)) refrescarItems();
      });
    } else {
      wrap.style.display="none";
      await detenerScanner();
    }
  });
  document.getElementById("btnStopCamera")?.addEventListener("click",async()=>{
    document.getElementById("cameraWrap").style.display="none";
    await detenerScanner();
  });

  // ── Modo ajuste inventario ──
  document.getElementById("btnModoAjuste")?.addEventListener("click",()=>{
    const w=document.getElementById("modoAjusteWrap");
    if(w) w.style.display=w.style.display==="none"?"block":"none";
  });
  document.getElementById("btnAjustarStock")?.addEventListener("click",()=>{
    const codigo=document.getElementById("ajusteCodigo")?.value.trim();
    const cant=parseInt(document.getElementById("ajusteCant")?.value)||1;
    if(!codigo) return toast("⚠️ Ingresa un código","warn");
    quitarStockPorCodigo(codigo,cant);
    if(document.getElementById("ajusteCodigo")) document.getElementById("ajusteCodigo").value="";
  });

  // ── Calcular subtotal fila de agregar ──
  const calcFila=()=>{
    const vProd=$("vProd"), vCant=$("vCant"), vDesc=$("vDesc"), vPrecio=$("vPrecio"), vTotal=$("vTotal");
    const prod=STATE.productos.find(p=>p.id==vProd?.value);
    if(!prod){ if(vPrecio)vPrecio.value=""; if(vTotal)vTotal.value=""; return; }
    const cant=parseInt(vCant?.value)||0;
    const desc=parseFloat(vDesc?.value)||0;
    const sub=prod.precio*cant-desc;
    if(vPrecio) vPrecio.value=fmtMoney(prod.precio);
    if(vTotal) vTotal.value=cant>0?fmtMoney(sub):"—";
  };
  $("vProd")?.addEventListener("change",calcFila);
  $("vCant")?.addEventListener("input",calcFila);
  $("vDesc")?.addEventListener("input",calcFila);
  calcFila();

  // Refrescar el panel de ítems sin recargar tab
  const refrescarItems=()=>{
    const cont=$("itemsContainer"); if(!cont) return;
    if(!STATE._items.length){ cont.innerHTML=`<div style="color:var(--text3);font-size:.83rem;padding:.5rem 0;text-align:center">Sin ítems agregados</div>`; return; }
    let gran=0;
    const rows=STATE._items.map((it,idx)=>{
      const sub=it.precio*it.cant-(it.desc||0); gran+=sub;
      return `<div style="display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--border)">
        <div style="flex:2;font-weight:600;font-size:.88rem">${it.nombre}</div>
        <div style="flex:1;font-size:.82rem;color:var(--text2)">${fmtMoney(it.precio)} × ${it.cant}</div>
        ${it.desc?`<div style="font-size:.78rem;color:var(--red)">-${fmtMoney(it.desc)}</div>`:""}
        <div style="font-weight:700;color:var(--green);font-family:var(--mono)">${fmtMoney(sub)}</div>
        <button class="icon-btn item-del" data-idx="${idx}">🗑️</button>
      </div>`;
    }).join("");
    const iva=gran*(STATE.config.ivaPct||0)/100;
    const tot=gran+iva;
    cont.innerHTML=rows+`
      <div style="margin-top:.75rem;padding-top:.5rem;border-top:2px solid var(--border)">
        ${iva>0?`<div style="display:flex;justify-content:space-between;font-size:.82rem;color:var(--text2);margin-bottom:.25rem"><span>IVA ${STATE.config.ivaPct}%</span><span>${fmtMoney(iva)}</span></div>`:""}
        <div style="display:flex;justify-content:space-between;font-size:1.15rem;font-weight:800;color:var(--green)"><span>TOTAL</span><span style="font-family:var(--mono)">${fmtMoney(tot)}</span></div>
      </div>`;
    // Re-attach delete buttons
    cont.querySelectorAll(".item-del").forEach(b=>b.addEventListener("click",()=>{
      STATE._items.splice(parseInt(b.dataset.idx),1);
      refrescarItems();
    }));
  };

  // Botón agregar ítem
  $("btnAgregarItem")?.addEventListener("click",()=>{
    const prod=STATE.productos.find(p=>p.id==$("vProd")?.value);
    const cant=parseInt($("vCant")?.value)||1;
    if(!prod) return toast("⚠️ Selecciona un producto","warn");
    if(cant<=0) return toast("⚠️ Cantidad inválida","warn");
    const stk=getStock(prod.id);
    if(stk!==null&&cant>stk) return toast(`⚠️ Stock insuficiente. Disponible: ${stk}`,"err");
    const desc=parseFloat($("vDesc")?.value)||0;
    STATE._items.push({prodId:prod.id, nombre:prod.nombre, precio:prod.precio, cant, desc});
    // Reset fila
    if($("vCant")) $("vCant").value="1";
    if($("vDesc")) $("vDesc").value="0";
    calcFila();
    refrescarItems();
    toast(`✅ "${prod.nombre}" agregado`,"ok");
  });

  // Limpiar todos los ítems
  $("btnLimpiarItems")?.addEventListener("click",()=>{
    if(!STATE._items.length) return;
    if(confirm2("¿Limpiar todos los ítems?")){ STATE._items=[]; refrescarItems(); }
  });

  // Registrar visita completa
  $("btnRegistrarVisita")?.addEventListener("click",()=>{
    if(!STATE._items.length) return toast("⚠️ Agrega al menos un producto","warn");
    const caja=cajaActiva();
    const cli=$("vCli")?.value;
    const emp=$("vEmp")?.value;
    const metodo=$("vMetodo")?.value||"efectivo";
    const notas=$("vNotas")?.value||"";
    const fecha=today(), hora=nowTime();
    // ID de visita compartido para todos los ítems de esta transacción
    const visitaId="V"+Date.now();
    const correlativo=generarCorrelativo();
    saveAll(); // guardar correlativo actualizado
    const nuevosIds=[];
    const empId=emp?parseInt(emp):null;
    STATE._items.forEach(it=>{
      const sub=it.precio*it.cant-(it.desc||0);
      const iva=sub*(STATE.config.ivaPct||0)/100;
      const total=sub+iva;
      const ing={
        id:uid("i"), visitaId, correlativo, fecha, hora,
        productoId:it.prodId, cantidad:it.cant,
        precioUnitario:it.precio, descuento:it.desc||0, total,
        metodoPago:metodo,
        clienteId:cli?parseInt(cli):null,
        empleadoId:empId, // FIX: usar empId fijo para toda la visita
        cajaId:caja?.id||null, notas
      };
      STATE.ingresos.push(ing);
      nuevosIds.push(ing.id);
    });
    saveAll();
    const totalVisita=STATE.ingresos.filter(i=>i.visitaId===visitaId).reduce((s,i)=>s+i.total,0);
    toast(`✅ Venta registrada — ${STATE._items.length} ítem(s) — ${fmtMoney(totalVisita)}`,"ok");
    STATE._items=[];
    showTicketVisita(visitaId);
    goTab("ventas");
  });

  // Historial: ticket por visita
  $$("[data-action='ticketVisita']").forEach(b=>b.addEventListener("click",()=>showTicketVisita(b.dataset.vid)));
  // Historial: eliminar visita
  $$("[data-action='delVisita']").forEach(b=>b.addEventListener("click",()=>{
    const vid=b.dataset.vid;
    if(confirm2("¿Eliminar esta venta completa?")){
      STATE.ingresos=STATE.ingresos.filter(i=>(i.visitaId||("v"+i.id))!==vid);
      saveAll(); toast("🗑️ Venta eliminada"); goTab("ventas");
    }
  }));
}

    const total=compras.reduce((s,i)=>s+i.total,0);
    const citasCliente=STATE.citas.filter(x=>x.clienteId===c.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const rows=compras.sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(i=>{
      const p=STATE.productos.find(pr=>pr.id===i.productoId);
      return `<tr><td>${i.fecha}</td><td>${p?.nombre||"—"}</td><td class="amt-green">${fmtMoney(i.total)}</td></tr>`;
    }).join("")||`<tr><td colspan="3" style="text-align:center;color:var(--text2);padding:1rem">Sin compras</td></tr>`;

    </tr>`).join("")||`<tr><td colspan="4" style="text-align:center;color:var(--text2);padding:.5rem">Sin citas</td></tr>`;

          <div><div style="font-size:.72rem;color:var(--text2)">Email</div><strong>${c.email||"—"}</strong></div>
          <div><div style="font-size:.72rem;color:var(--text2)">Total gastado</div><strong class="c-green">${fmtMoney(total)}</strong></div>
          <div><div style="font-size:.72rem;color:var(--text2)">Visitas</div><strong>${compras.length}</strong></div>
          <div><div style="font-size:.72rem;color:var(--text2)">Citas</div><strong>${citasCliente.length}</strong></div>
        </div>
        ${c.notas?`<div class="alert alert-warning">📝 ${c.notas}</div>`:""}
        <div class="two-col" style="gap:1rem">
          <div>
            <div class="card-title">Historial de compras</div>
            <div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Producto</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table></div>
          </div>
          <div>
            <div class="card-title">Citas</div>
            <div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Hora</th><th>Servicio</th><th>WhatsApp</th></tr></thead><tbody>${rowsCitas}</tbody></table></div>
          </div>

    $("modalCli")?.addEventListener("click",e=>{ if(e.target.id==="modalCli") $("modalCli").remove(); });
    $("btnCerrarCli")?.addEventListener("click",()=>$("modalCli").remove());
  }));

  $$("[data-action='delCli']").forEach(b=>b.addEventListener("click",()=>{
    const id=parseInt(b.dataset.id);
    if(confirm2("¿Eliminar cliente?")){ STATE.clientes=STATE.clientes.filter(c=>c.id!==id); saveAll(); toast("🗑️ Cliente eliminado"); goTab("clientes"); }
  }));
}

function registrarHistorialWA(cliente, plantilla, citaId=null, tipo=null){
  let h=[]; try{ h=JSON.parse(localStorage.getItem("np_historial_wa")||"[]"); }catch(e){}
  h.unshift({cliente,plantilla,citaId,tipo,fecha:today(),hora:nowTime()});
  if(h.length>50) h.length=50;
  localStorage.setItem("np_historial_wa",JSON.stringify(h));
}

function attachCatalogoEvents(){
  const showForm=(s=true)=>{ const f=$("formProd"); if(f) f.style.display=s?"block":"none"; };

    $("formProdTitle").textContent="Nuevo Producto / Servicio";
    ["pNombre","pPrecio","pCosto","pCat"].forEach(id=>{ const el=$(id); if(el) el.value=""; });
    $("pStock").value="0"; $("pTipo").value="servicio"; $("pEditId").value="";
    showForm();
  });
  $("btnCancelarProd")?.addEventListener("click",()=>showForm(false));
  $("btnGuardarProd")?.addEventListener("click",()=>{
    const nombre=$("pNombre")?.value.trim();
    const precio=parseFloat($("pPrecio")?.value);
    if(!nombre) return toast("⚠️ Nombre requerido","warn");
    if(isNaN(precio)||precio<0) return toast("⚠️ Precio inválido","warn");
    const editId=parseInt($("pEditId")?.value);
    const data={nombre,tipo:$("pTipo").value,precio,costo:parseFloat($("pCosto").value)||0,stockInicial:parseInt($("pStock").value)||0,categoria:$("pCat").value||"",codigoBarras:$("pCodigo")?.value.trim()||""};
    if(editId){ const p=STATE.productos.find(x=>x.id===editId); if(p) Object.assign(p,data); }
    else STATE.productos.push({id:uid("p"),...data});
    saveAll(); toast("✅ Producto guardado","ok"); goTab("catalogo");
  });

  $$("[data-action='editProd']").forEach(b=>b.addEventListener("click",()=>{
    const p=STATE.productos.find(x=>x.id===parseInt(b.dataset.id));
    if(!p) return;
    $("formProdTitle").textContent="Editar Producto";
    $("pNombre").value=p.nombre; $("pTipo").value=p.tipo; $("pPrecio").value=p.precio;
    $("pCosto").value=p.costo||0; $("pStock").value=p.stockInicial||0; $("pCat").value=p.categoria||"";
    if($("pCodigo")) $("pCodigo").value=p.codigoBarras||"";
    $("pEditId").value=p.id;
    showForm(); $("formProd").scrollIntoView({behavior:"smooth"});
  }));

  // Escáner USB para catálogo
  const pCodigoEl=$("pCodigo");
  if(pCodigoEl){
    pCodigoEl.addEventListener("keydown",e=>{
      if(e.key==="Enter"){ e.preventDefault(); toast("✅ Código: "+pCodigoEl.value,"ok",1200); }
    });
  }
  // Cámara para catálogo
  $("btnCamaraCatalogo")?.addEventListener("click",async()=>{
    const wrap=$("cameraCatalogWrap");
    if(!wrap) return;
    if(wrap.style.display==="none"){
      wrap.style.display="block";
      let scanned=false;
      await iniciarScannerCatalogo("scannerCatalog", codigo=>{
        if(scanned) return; scanned=true;
        if(pCodigoEl) pCodigoEl.value=codigo;
        toast("✅ Código escaneado: "+codigo,"ok",1500);
        wrap.style.display="none";
        detenerScannerCatalogo();
      });
    } else {
      wrap.style.display="none";
      detenerScannerCatalogo();
    }
  });
  $("btnStopCamaraCatalogo")?.addEventListener("click",()=>{
    $("cameraCatalogWrap").style.display="none";
    detenerScannerCatalogo();
  });

  $$("[data-action='delProd']").forEach(b=>b.addEventListener("click",()=>{
    const id=parseInt(b.dataset.id);
    if(STATE.ingresos.some(i=>i.productoId===id)&&!confirm2("Este producto tiene ventas. ¿Eliminar igualmente?")) return;
    else if(!STATE.ingresos.some(i=>i.productoId===id)&&!confirm2("¿Eliminar producto?")) return;
    STATE.productos=STATE.productos.filter(p=>p.id!==id); saveAll(); toast("🗑️ Eliminado"); goTab("catalogo");
  }));
}

function attachContabilidadEvents(){
  const filtrar=(mes)=>{
    const movs=[
      ...STATE.ingresos.filter(i=>!mes||i.fecha.startsWith(mes)).map(i=>{const p=STATE.productos.find(pr=>pr.id===i.productoId);return{fecha:i.fecha,tipo:"INGRESO",concepto:p?.nombre||"—",metodo:i.metodoPago||"efectivo",monto:i.total};}),
      ...STATE.gastos.filter(g=>!mes||g.fecha.startsWith(mes)).map(g=>({fecha:g.fecha,tipo:"GASTO",concepto:g.descripcion,metodo:"—",monto:g.monto}))

      <td>${m.fecha}</td>

    </tr>`).join("")||`<tr><td colspan="5" style="text-align:center;padding:1rem;color:var(--text2)">Sin movimientos</td></tr>`;

function exportCSV(data, filename){
  const blob=new Blob([data],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
}

function attachReportesEvents(){
  const doExport=(btn,btn2)=>{
    [btn,btn2].forEach(id=>{
      $(id)?.addEventListener("click",()=>{
        const snap={productos:STATE.productos,ingresos:STATE.ingresos,gastos:STATE.gastos,clientes:STATE.clientes,citas:STATE.citas,sucursales:STATE.sucursales,config:STATE.config,usuarios:STATE.usuarios,ids:STATE.ids};
        const blob=new Blob([JSON.stringify(snap,null,2)],{type:"application/json"});
        const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`backup_${today()}.json`; a.click();
        toast("📤 Backup exportado","ok");
      });
    });
  };
  doExport("btnExportJSON","btnExportJSON2");

  ["btnImportJSON","btnImportJSON2"].forEach(id=>{
    $(id)?.addEventListener("click",()=>{
      const inp=document.createElement("input"); inp.type="file"; inp.accept=".json";
      inp.onchange=e=>{
        const f=e.target.files[0]; const r=new FileReader();
        r.onload=ev=>{
          try{
            const d=JSON.parse(ev.target.result);
            ["productos","ingresos","gastos","clientes","citas","sucursales","cajas"].forEach(k=>{ if(d[k]) STATE[k]=d[k]; });
            if(d.config) STATE.config={...STATE.config,...d.config};
            if(d.ids) STATE.ids={...STATE.ids,...d.ids};
            saveAll(); toast("✅ Importado","ok"); renderApp();
          }catch(e){ toast("❌ Archivo inválido","err"); }
        }; r.readAsText(f);
      }; inp.click();
    });
  });

  ["btnRestaurarAuto","btnRestaurar2"].forEach(id=>{
    $(id)?.addEventListener("click",()=>{
      if(!confirm2("¿Restaurar último backup automático?")) return;
      const ts=restoreBackup();
      if(ts){ toast(`✅ Restaurado desde ${new Date(ts).toLocaleString()}`,"ok"); renderApp(); }
      else toast("⚠️ Sin backups disponibles","warn");
    });
  });

  $("btnExportCSVIng")?.addEventListener("click",()=>{
    const rows=["Fecha,Hora,Producto,Cantidad,P.Unit,Descuento,Total,Cliente,Empleado,MetodoPago"];
    STATE.ingresos.forEach(i=>{
      const p=STATE.productos.find(pr=>pr.id===i.productoId);
      const cl=STATE.clientes.find(c=>c.id===i.clienteId);
      const emp=STATE.usuarios.find(u=>u.id===i.empleadoId);
      rows.push(`${i.fecha},${i.hora||""},${p?.nombre||"?"},${i.cantidad},${i.precioUnitario},${i.descuento||0},${i.total},${cl?.nombre||""},${emp?.nombre||emp?.username||""},${i.metodoPago||""}`);
    });
    exportCSV(rows.join("\n"),`ventas_${today()}.csv`); toast("📊 CSV exportado","ok");
  });

  $("btnExportCSVGas")?.addEventListener("click",()=>{
    const rows=["Fecha,Descripcion,Categoria,Monto"];
    STATE.gastos.forEach(g=>rows.push(`${g.fecha},${g.descripcion},${g.categoria},${g.monto}`));
    exportCSV(rows.join("\n"),`gastos_${today()}.csv`); toast("📊 CSV exportado","ok");
  });

  $("btnGenReporte")?.addEventListener("click",()=>{
    const desde=$("repDesde")?.value, hasta=$("repHasta")?.value;
    const ings=STATE.ingresos.filter(i=>(!desde||i.fecha>=desde)&&(!hasta||i.fecha<=hasta));
    const gas=STATE.gastos.filter(g=>(!desde||g.fecha>=desde)&&(!hasta||g.fecha<=hasta));
    const totalIng=ings.reduce((s,i)=>s+i.total,0);
    const totalGas=gas.reduce((s,g)=>s+g.monto,0);
    const html=`<div class="stats-grid">
      <div class="stat"><div class="stat-label">Ingresos</div><div class="stat-value c-green">${fmtMoney(totalIng)}</div></div>
      <div class="stat"><div class="stat-label">Gastos</div><div class="stat-value c-red">${fmtMoney(totalGas)}</div></div>
      <div class="stat"><div class="stat-label">Balance</div><div class="stat-value ${totalIng-totalGas>=0?"c-green":"c-red"}">${fmtMoney(totalIng-totalGas)}</div></div>
      <div class="stat"><div class="stat-label">N° ventas</div><div class="stat-value">${ings.length}</div></div>
    </div>`;
    const result=$("repResult"); if(result) result.innerHTML=html;
  });
}

  { id:"p4", nombre:"Confirmación",     texto:"Hola {nombre}, confirmamos tu cita en {negocio} para el {fecha} a las {hora}. Responde 'OK' para confirmar o 'NO' para cancelar." },

function getPlantillas(){
  const saved = LS.load("plantillas");
  if(saved && saved.length) return saved;
  // Primera vez: guardar las por defecto en LS para que sean editables
  const defaults = [...PLANTILLAS_DEFAULT];
  savePlantillas(defaults);
  return defaults;
}
function savePlantillas(pl){ LS.save("plantillas", pl); }

function aplicarPlantilla(texto, clienteId, citaId){
  const c = STATE.clientes.find(x=>x.id===clienteId)||{nombre:"Cliente"};
  const cita = STATE.citas.find(x=>x.id===citaId)||{};
  return texto
    .replace(/{nombre}/g, c.nombre)
    .replace(/{negocio}/g, STATE.config.nombreNegocio)
    .replace(/{hora}/g, cita.hora||"")
    .replace(/{fecha}/g, cita.fecha||"")
    .replace(/{servicio}/g, cita.titulo||"");
}

// Genera link SMS nativo
function linkWA(telefono, mensaje){
  let num = (telefono||"").replace(/\D/g,"");
  if(num.length <= 8) num = "503" + num;
  const txt = encodeURIComponent(mensaje);
  return `https://wa.me/${num}?text=${txt}`;
}

// Verifica recordatorios pendientes al iniciar sesión
let _reminderTimer = null;
function iniciarMotorRecordatorios(){
  verificarRecordatorios();
  if(_reminderTimer) clearInterval(_reminderTimer);
  _reminderTimer = setInterval(verificarRecordatorios, 60000); // cada minuto
}

function verificarRecordatorios(){
  const ahora = new Date();
  const hoy = today();
  const horaActual = ahora.getHours()*60 + ahora.getMinutes();

  // IDs ya descartados en esta sesión
  const descartados = JSON.parse(sessionStorage.getItem("rem_descartados")||"[]");

  const pendientes = [];

  STATE.citas.forEach(cita => {
    if(!cita.clienteId || !cita.hora) return;
    if(descartados.includes("rem_"+cita.id+"_24") && descartados.includes("rem_"+cita.id+"_1")) return;

    const [hh,mm] = cita.hora.split(":").map(Number);
    const citaFecha = new Date(cita.fecha+"T"+cita.hora+":00");
    const diffMs = citaFecha - ahora;
    const diffMin = diffMs / 60000;

    // 24h antes: entre 23h y 25h de anticipación
    if(diffMin > 0 && diffMin <= 1500 && diffMin >= 1380 && !descartados.includes("rem_"+cita.id+"_24")){
      pendientes.push({ cita, tipo:"24h", key:"rem_"+cita.id+"_24", urgente:false });
    }
    // 1h antes: entre 50min y 70min de anticipación
    if(diffMin > 0 && diffMin <= 70 && diffMin >= 50 && !descartados.includes("rem_"+cita.id+"_1")){
      pendientes.push({ cita, tipo:"1h", key:"rem_"+cita.id+"_1", urgente:true });
    }
  });

  mostrarBannerRecordatorios(pendientes);
}

function mostrarBannerRecordatorios(items){
  // Limpiar banner anterior
  let banner = $("reminderBanner");
  if(!banner){
    banner = document.createElement("div");
    banner.id = "reminderBanner";
    banner.className = "reminder-banner";
    document.body.appendChild(banner);
  }
  // Solo agregar los nuevos (no duplicar)
  const yaShown = [...banner.querySelectorAll("[data-remkey]")].map(el=>el.dataset.remkey);

  items.forEach(item => {
    if(yaShown.includes(item.key)) return;
    const c = STATE.clientes.find(x=>x.id===item.cita.clienteId);
    const nombre = c?.nombre||"Cliente";
    const label = item.tipo==="24h" ? "Mañana" : "En 1 hora";
    const el = document.createElement("div");
    el.className = "reminder-item"+(item.urgente?" urgent":"");
    el.dataset.remkey = item.key;
    el.innerHTML = `
      <div class="reminder-dot ${item.urgente?"urgent":""}"></div>
      <div style="flex:1">
        <strong>⏰ Recordatorio ${item.tipo}</strong> —
        <strong>${nombre}</strong> tiene cita <strong>${label}</strong> (${item.cita.fecha} ${item.cita.hora}) · ${item.cita.titulo}
      </div>
      ${c?.telefono?`<button class="btn btn-primary btn-xs" onclick="enviarRecordatorioRapido(${item.cita.id},'${item.tipo}')">💬 WhatsApp</button>`:"<span style='font-size:.72rem;color:var(--text2)'>Sin teléfono</span>"}
      <button class="reminder-dismiss" data-remkey="${item.key}">✕</button>
    `;
    banner.appendChild(el);
    el.querySelector(".reminder-dismiss").addEventListener("click", ()=>{
      const desc = JSON.parse(sessionStorage.getItem("rem_descartados")||"[]");
      desc.push(item.key);
      sessionStorage.setItem("rem_descartados", JSON.stringify(desc));
      el.remove();
    });
  });

  // Mover main si hay banners
  const count = banner.children.length;
  const mc = $("mainContent");
  if(mc) mc.style.paddingTop = count > 0 ? (count*52+32)+"px" : "";
}

function enviarRecordatorioRapido(citaId, tipo){
  const cita = STATE.citas.find(c=>c.id===citaId);
  if(!cita||!cita.clienteId) return;
  const cli = STATE.clientes.find(c=>c.id===cita.clienteId);
  if(!cli?.telefono) return toast("⚠️ Cliente sin teléfono registrado","warn");
  const plantillas = getPlantillas();
  const plantilla = tipo==="1h" ? plantillas[1] : plantillas[0];
  const msg = aplicarPlantilla(plantilla.texto, cli.id, citaId);
  window.open(linkWA(cli.telefono, msg));
}

// ════════════════════════════════════════════════════════════
//  PWA — REGISTRO DEL SERVICE WORKER
// ════════════════════════════════════════════════════════════
if("serviceWorker" in navigator){
  window.addEventListener("load", async ()=>{
    try{
      const reg = await navigator.serviceWorker.register("sw.js", { scope: "/business-pro/" });
      console.log("[PWA] Service Worker registrado:", reg.scope);

      // Detectar actualización disponible
      reg.addEventListener("updatefound", ()=>{
        const newSW = reg.installing;
        newSW.addEventListener("statechange", ()=>{
          if(newSW.state==="installed" && navigator.serviceWorker.controller){
            toast("🔄 Actualización disponible — recarga la página","ok",5000);
          }
        });
      });
    } catch(e){
      console.warn("[PWA] Service Worker no registrado:", e.message);
    }
  });
}

// Detectar si está instalada como PWA
const esPWA = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
if(esPWA) console.log("[PWA] Ejecutándose como app instalada");

// Detectar cuando vuelve la conexión
window.addEventListener("online",  ()=>{ toast("✅ Conexión restaurada","ok"); saveAll(); });
window.addEventListener("offline", ()=>{ toast("⚠️ Sin conexión — trabajando offline","warn",4000); });

// ════════════════════════════════════════════════════════════
//  INICIO
// ════════════════════════════════════════════════════════════
loadAll();
renderApp();
</script>
