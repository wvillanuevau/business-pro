<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Royal Barbershop Pro</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e8a020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Barbershop">
<link rel="apple-touch-icon" href="https://em-content.zobj.net/source/google/387/barber-pole_1f488.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Royal Barbershop Pro">
<meta name="description" content="Sistema de gestión Royal Barbershop">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Karla:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ══ TOKENS ══ */
:root{
  --bg:#0e0d0b;
  --bg2:#141310;
  --surface:#1a1815;
  --surface2:#201e1a;
  --surface3:#272420;
  --border:#2e2b26;
  --border2:#3a362f;
  --text:#f0ece4;
  --text2:#9a9080;
  --text3:#5a5448;
  --accent:#e8a020;
  --accent2:#f5c050;
  --accent-dim:rgba(232,160,32,0.12);
  --green:#2db87a;
  --green-dim:rgba(45,184,122,0.12);
  --red:#e84040;
  --red-dim:rgba(232,64,64,0.12);
  --blue:#4090e8;
  --blue-dim:rgba(64,144,232,0.12);
  --purple:#9060e0;
  --purple-dim:rgba(144,96,224,0.12);
  --shadow:0 2px 8px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.5);
  --r:10px;
  --r-lg:16px;
  --font:'Karla',system-ui,sans-serif;
  --font-display:'Syne',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --sidebar:240px;
}
body.light{
  --bg:#f2f0eb;
  --bg2:#e8e5de;
  --surface:#ffffff;
  --surface2:#f5f2ec;
  --surface3:#ede9e0;
  --border:#ddd9cf;
  --border2:#ccc7bb;
  --text:#1a1814;
  --text2:#6a6258;
  --text3:#a09880;
  --accent:#c07010;
  --accent2:#e09030;
  --accent-dim:rgba(192,112,16,0.1);
  --green:#1a9060;
  --green-dim:rgba(26,144,96,0.1);
  --red:#c03030;
  --red-dim:rgba(192,48,48,0.1);
  --blue:#2060c0;
  --blue-dim:rgba(32,96,192,0.1);
  --purple:#7040c0;
  --purple-dim:rgba(112,64,192,0.1);
  --shadow:0 1px 4px rgba(0,0,0,0.08);
  --shadow-lg:0 4px 20px rgba(0,0,0,0.1);
}

html{touch-action:manipulation}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;
  overflow-x:hidden;-webkit-text-size-adjust:100%}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ══ LOGIN ══ */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;
  background:var(--bg);background-image:radial-gradient(ellipse at 20% 50%,rgba(232,160,32,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(64,144,232,0.04) 0%,transparent 50%)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.login-logo{font-family:var(--font-display);font-size:1.8rem;font-weight:800;color:var(--accent);text-align:center;margin-bottom:0.25rem}
.login-tagline{text-align:center;font-size:0.8rem;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2rem}
.login-divider{display:flex;align-items:center;gap:1rem;margin:1rem 0;color:var(--text3);font-size:0.78rem}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ══ LAYOUT ══ */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:1.25rem 0.75rem;
  padding-top:calc(1.25rem + env(safe-area-inset-top,0px));
  padding-bottom:calc(1.25rem + env(safe-area-inset-bottom,0px));
  position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s}
.sidebar-logo{font-family:var(--font-display);font-size:1.05rem;font-weight:800;color:var(--accent);
  padding:0 0.5rem;margin-bottom:0.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-sub{font-size:0.72rem;color:var(--text3);padding:0 0.5rem;margin-bottom:1.5rem}
.sidebar-section{font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text3);padding:0 0.75rem;margin:1rem 0 0.4rem}
.nav-btn{display:flex;align-items:center;gap:0.65rem;padding:0.55rem 0.75rem;border-radius:var(--r);
  border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:0.85rem;
  font-weight:500;cursor:pointer;width:100%;text-align:left;transition:all .15s;margin-bottom:1px}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--accent-dim);color:var(--accent);font-weight:700}
.nav-btn .nav-icon{width:18px;text-align:center;font-size:0.9rem;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:white;font-size:0.65rem;font-weight:700;
  padding:0.1rem 0.45rem;border-radius:20px}
.sidebar-footer{margin-top:auto;border-top:1px solid var(--border);padding-top:0.75rem}
.user-chip{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0.75rem;margin-bottom:0.5rem}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:var(--accent);flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:0.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:0.7rem;color:var(--text2)}

.main{margin-left:var(--sidebar);flex:1;padding:2rem;min-width:0}
.hamburger{display:none;position:fixed;bottom:calc(1.5rem + env(safe-area-inset-bottom,0px));right:1.25rem;
  z-index:9000;background:var(--accent);color:var(--bg);border:none;border-radius:50%;
  width:56px;height:56px;font-size:1.4rem;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,0.4),0 0 0 3px rgba(232,160,32,0.2)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
@media(max-width:768px){
  .hamburger{display:flex;align-items:center;justify-content:center}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.open{display:block}
  .main{margin-left:0;padding:1rem;padding-top:1rem;padding-bottom:calc(6rem + env(safe-area-inset-bottom,0px))}
  .sidebar{padding-top:calc(1.25rem + env(safe-area-inset-top,20px))}
}

/* ══ PAGE ══ */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.page-title{font-family:var(--font-display);font-size:1.5rem;font-weight:800}
.page-actions{display:flex;gap:0.5rem;flex-wrap:wrap}

/* ══ CARDS ══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
.card-title{font-family:var(--font-display);font-size:0.95rem;font-weight:700;margin-bottom:1rem;color:var(--text)}
.card-sub{font-size:0.78rem;color:var(--text2);margin-top:-0.6rem;margin-bottom:1rem}

/* ══ STATS ══ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1.25rem}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr 1fr}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.1rem;box-shadow:var(--shadow)}
.stat-icon{font-size:1.3rem;margin-bottom:0.4rem}
.stat-label{font-size:0.72rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.3rem}
.stat-value{font-family:var(--mono);font-size:1.4rem;font-weight:600}
.stat-delta{font-size:0.72rem;margin-top:0.25rem;font-weight:600}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-accent{color:var(--accent)}.c-purple{color:var(--purple)}

/* ══ TABLAS ══ */
.table-wrap{overflow-x:auto;border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
thead tr{background:var(--surface2)}
th{padding:0.6rem 0.75rem;text-align:left;font-size:0.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:0.65rem 0.75rem;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}

/* ══ FORMS ══ */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.75rem;align-items:end;width:100%;overflow:hidden}
.fg{display:flex;flex-direction:column;gap:0.3rem}
.fg.span2{grid-column:span 2}
.fg.span3{grid-column:span 3}
label{font-size:0.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em}
input,select,textarea{padding:0.55rem 0.75rem;border:1px solid var(--border);border-radius:var(--r);font-size:16px!important;max-width:100%;box-sizing:border-box;
  background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.88rem;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
input[readonly]{background:var(--surface3);color:var(--text2);cursor:default}

/* ══ BOTONES ══ */
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.55rem 1.1rem;border-radius:40px;
  border:none;cursor:pointer;font-family:var(--font);font-weight:700;font-size:0.83rem;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn-outline:hover{background:var(--accent-dim)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface3);color:var(--text)}
.btn-danger{background:var(--red);color:white}
.btn-danger:hover{opacity:0.85}
.btn-green{background:var(--green);color:white}
.btn-green:hover{opacity:0.85}
.btn-sm{padding:0.35rem 0.8rem;font-size:0.78rem}
.btn-xs{padding:0.25rem 0.6rem;font-size:0.72rem}
.icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
  padding:0.35rem 0.55rem;cursor:pointer;font-size:0.85rem;transition:background .15s;line-height:1}
.icon-btn:hover{background:var(--surface3)}

/* ══ BADGE ══ */
.badge{display:inline-block;padding:0.18rem 0.6rem;border-radius:20px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.bg-green{background:var(--green-dim);color:var(--green)}
.bg-red{background:var(--red-dim);color:var(--red)}
.bg-blue{background:var(--blue-dim);color:var(--blue)}
.bg-accent{background:var(--accent-dim);color:var(--accent)}
.bg-purple{background:var(--purple-dim);color:var(--purple)}
.bg-gray{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}

/* ══ MONO AMOUNTS ══ */
.amt{font-family:var(--mono);font-weight:600}
.amt-green{font-family:var(--mono);font-weight:600;color:var(--green)}
.amt-red{font-family:var(--mono);font-weight:600;color:var(--red)}
.amt-blue{font-family:var(--mono);font-weight:600;color:var(--blue)}

/* ══ TOAST ══ */
.toast{position:fixed;top:1.5rem;right:1rem;background:var(--text);color:var(--bg);padding:0.7rem 1.2rem;
  border-radius:40px;font-size:0.83rem;font-weight:700;z-index:9999;box-shadow:var(--shadow-lg);animation:slidedown .25s ease;
  max-width:calc(100vw - 2rem)}
@keyframes slidedown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ══ MODAL ══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.75rem;width:100%;max-width:560px;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-title{font-family:var(--font-display);font-size:1.1rem;font-weight:800}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:0.3rem 0.6rem;cursor:pointer;font-size:1rem}

/* ══ TICKET ══ */
.ticket{background:white;color:#111;padding:1.5rem;font-family:'JetBrains Mono',monospace;font-size:0.78rem;
  border-radius:var(--r);max-width:320px;margin:0 auto;border:1px dashed #ccc}
.ticket-header{text-align:center;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px dashed #ccc}
.ticket-row{display:flex;justify-content:space-between;padding:0.1rem 0}
.ticket-total{border-top:1px dashed #ccc;margin-top:0.5rem;padding-top:0.5rem;font-weight:700}
.ticket-footer{text-align:center;margin-top:0.75rem;padding-top:0.75rem;border-top:1px dashed #ccc;font-size:0.7rem;color:#666}

/* ══ CALENDARIO ══ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-day-header{text-align:center;font-size:0.68rem;font-weight:700;color:var(--text2);padding:0.4rem}
.cal-day{min-height:72px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:0.4rem;cursor:pointer;transition:background .15s}
.cal-day:hover{background:var(--surface3)}
.cal-day.today{border-color:var(--accent);background:var(--accent-dim)}
.cal-day.other-month{opacity:0.35}
.cal-day-num{font-size:0.75rem;font-weight:700;color:var(--text2);margin-bottom:0.2rem}
.cal-event{background:var(--blue-dim);color:var(--blue);font-size:0.65rem;padding:0.1rem 0.3rem;border-radius:4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.cal-event.servicio{background:var(--accent-dim);color:var(--accent)}
.cal-event.ocupado{background:var(--red-dim);color:var(--red)}
.cal-nav{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
.cal-nav-title{font-family:var(--font-display);font-weight:800;font-size:1.1rem;flex:1;text-align:center}

/* ══ SWITCH ══ */
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid var(--border)}
.switch-row:last-child{border-bottom:none}
.switch{position:relative;width:42px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch-slider{position:absolute;inset:0;background:var(--surface3);border-radius:24px;cursor:pointer;transition:.2s}
.switch-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:var(--text2);border-radius:50%;transition:.2s}
.switch input:checked+.switch-slider{background:var(--green)}
.switch input:checked+.switch-slider::before{transform:translateX(18px);background:white}

/* ══ PROGRESS ══ */
.progress-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:0.4rem}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}

/* ══ EMPTY ══ */
.empty{text-align:center;padding:3rem 1rem;color:var(--text2)}
.empty-icon{font-size:2.5rem;margin-bottom:0.75rem;opacity:0.5}
.empty p{font-size:0.88rem}

/* ══ SUCURSAL TAG ══ */
.branch-tag{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.72rem;font-weight:600;color:var(--text2);background:var(--surface3);padding:0.15rem 0.5rem;border-radius:20px;border:1px solid var(--border)}

/* ══ CHART ══ */
.chart-box{position:relative;max-height:280px}

/* ══ TWO COL ══ */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}}
@media(max-width:640px){.two-col{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.fg.span2,.fg.span3{grid-column:span 1}}

/* ══ ALERT ══ */
.alert{padding:0.75rem 1rem;border-radius:var(--r);font-size:0.83rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.alert-warning{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(232,160,32,0.2)}
.alert-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(232,64,64,0.2)}
.alert-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(45,184,122,0.2)}

/* ══ CAJA ══ */
.caja-closed{text-align:center;padding:3rem;background:var(--surface);border:2px dashed var(--border2);border-radius:var(--r-lg)}
.caja-open-banner{background:var(--green-dim);border:1px solid var(--green);border-radius:var(--r);padding:0.75rem 1rem;display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;font-weight:700;color:var(--green)}

/* ══ INPUT ROW ══ */
.input-row{display:flex;gap:0.5rem;align-items:flex-end}

/* ══ SEPARADOR ══ */
.sep{height:1px;background:var(--border);margin:1rem 0}

/* ══ PILL TABS ══ */
.pill-tabs{display:flex;gap:0.3rem;background:var(--surface2);padding:0.3rem;border-radius:40px;margin-bottom:1.25rem;flex-wrap:wrap}
.pill-tab{padding:0.4rem 1rem;border-radius:40px;border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all .15s}
.pill-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

/* ══ RECORDATORIOS ══ */
.reminder-banner{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;flex-direction:column;gap:0;pointer-events:none}
.reminder-item{background:var(--surface);border-bottom:2px solid var(--accent);padding:.65rem 1.25rem;display:flex;align-items:center;gap:1rem;box-shadow:var(--shadow-lg);pointer-events:all;animation:slideDown .35s ease}
.reminder-item.urgent{border-bottom-color:var(--red);background:var(--red-dim)}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.reminder-dismiss{margin-left:auto;background:transparent;border:1px solid var(--border);border-radius:var(--r);padding:.25rem .5rem;cursor:pointer;font-size:.75rem;color:var(--text2)}
.sms-preview{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:.75rem 1rem;font-size:.83rem;color:var(--text);margin:.5rem 0;white-space:pre-wrap;font-family:var(--font)}
.template-chip{display:inline-flex;align-items:center;gap:.3rem;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:.25rem .75rem;font-size:.75rem;cursor:pointer;transition:background .15s}
.template-chip:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

//  FIREBASE REST API — sin SDK, funciona desde file://
// ════════════════════════════════════════════════════════════
const FB = {
  project: "royal-barbershop-5d73c",
  apiKey:  "AIzaSyDq3RC-d8U0Bv7xMhWv8WdKEh3AVldUK9g",

  // Base URL para datos de una empresa específica (multi-tenant)
  base(empresaId){
    const eid = empresaId || STATE.empresaActual?.id || "negocio";
    return `https://firestore.googleapis.com/v1/projects/${this.project}/databases/(default)/documents/empresas/${eid}/datos`;
  },
  // Base URL para el directorio de empresas (superadmin)
  baseSA(){ return `https://firestore.googleapis.com/v1/projects/${this.project}/databases/(default)/documents/superadmin`; },

  // Serializar JS → Firestore value format
  toFB(val){
    if(val===null||val===undefined) return {nullValue:null};
    if(typeof val==="boolean")      return {booleanValue:val};
    if(typeof val==="number")       return {doubleValue:val};
    if(typeof val==="string")       return {stringValue:val};
    if(Array.isArray(val))          return {stringValue:JSON.stringify(val)};
    if(typeof val==="object")       return {stringValue:JSON.stringify(val)};
    return {stringValue:String(val)};
  },

  // Deserializar Firestore value → JS
  fromFB(fval){
    if(!fval) return null;
    if("nullValue"    in fval) return null;
    if("booleanValue" in fval) return fval.booleanValue;
    if("doubleValue"  in fval) return fval.doubleValue;
    if("integerValue" in fval) return Number(fval.integerValue);
    if("stringValue"  in fval){
      const s = fval.stringValue;
      try{ return JSON.parse(s); }catch(e){ return s; }
    }
    return null;
  },

  // Guardar documento (en colección de empresa)
  async set(docId, obj, empresaId=null){
    const fields={};
    Object.entries(obj).forEach(([k,v])=>{ fields[k]=this.toFB(v); });
    const url=`${this.base(empresaId)}/${docId}?key=${this.apiKey}`;
    const r=await fetch(url,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({fields})});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },

  // Leer documento (de colección de empresa)
  async get(docId, empresaId=null){
    const url=`${this.base(empresaId)}/${docId}?key=${this.apiKey}`;
    const r=await fetch(url);
    if(r.status===404) return null;
    if(!r.ok) throw new Error(await r.text());
    const doc=await r.json();
    if(!doc.fields) return null;
    const out={};
    Object.entries(doc.fields).forEach(([k,v])=>{ out[k]=this.fromFB(v); });
    return out;
  },

  // Guardar en superadmin (directorio de empresas)
  async setSA(docId, obj){
    const fields={};
    Object.entries(obj).forEach(([k,v])=>{ fields[k]=this.toFB(v); });
    const url=`${this.baseSA()}/${docId}?key=${this.apiKey}`;
    const r=await fetch(url,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({fields})});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },

  // Leer del superadmin
  async getSA(docId){
    const url=`${this.baseSA()}/${docId}?key=${this.apiKey}`;
    const r=await fetch(url);
    if(r.status===404) return null;
    if(!r.ok) throw new Error(await r.text());
    const doc=await r.json();
    if(!doc.fields) return null;
    const out={};
    Object.entries(doc.fields).forEach(([k,v])=>{ out[k]=this.fromFB(v); });
    return out;
  },

  // Leer documento desde colección LEGACY (antes del multi-tenant)
  async getLegacy(docId){
    const url=`https://firestore.googleapis.com/v1/projects/${this.project}/databases/(default)/documents/negocio/${docId}?key=${this.apiKey}`;
    const r=await fetch(url);
    if(r.status===404) return null;
    if(!r.ok) return null;
    const doc=await r.json();
    if(!doc.fields) return null;
    const out={};
    Object.entries(doc.fields).forEach(([k,v])=>{ out[k]=this.fromFB(v); });
    return out;
  },

  // Listar documentos de una colección
  async list(colPath){
    const url=`https://firestore.googleapis.com/v1/projects/${this.project}/databases/(default)/documents/${colPath}?key=${this.apiKey}`;
    const r=await fetch(url);
    if(!r.ok) return [];
    const data=await r.json();
    return (data.documents||[]).map(doc=>{
      const out={_id:doc.name.split("/").pop()};
      Object.entries(doc.fields||{}).forEach(([k,v])=>{ out[k]=this.fromFB(v); });
      return out;
    });
  }
};

function updateSyncIndicator(status){

  const el=document.getElementById("syncIndicator");

  const map={ok:"☁️ Nube OK",loading:"🔄 Sincronizando...",err:"⚠️ Sin nube (local)",offline:"💾 Local"};

const LS = {
  // Prefijo incluye ID de empresa para aislar datos
  prefix(){ return "np_"+(STATE.empresaActual?.id||"default")+"_"; },
  save(k,v){ try{ localStorage.setItem(this.prefix()+k,JSON.stringify(v)); }catch(e){} },
  load(k){   try{ const v=localStorage.getItem(this.prefix()+k); return v?JSON.parse(v):null; }catch(e){ return null; } },
  // Para datos globales (no por empresa)
  saveG(k,v){ try{ localStorage.setItem("np_g_"+k,JSON.stringify(v)); }catch(e){} },
  loadG(k){   try{ const v=localStorage.getItem("np_g_"+k); return v?JSON.parse(v):null; }catch(e){ return null; } },
  clearEmpresa(id){ // limpiar datos locales de una empresa
    const prefix="np_"+id+"_";
    Object.keys(localStorage).filter(k=>k.startsWith(prefix)).forEach(k=>localStorage.removeItem(k));
  }
};

const FB_COLS = ["usuarios","productos","ingresos","gastos","clientes","citas","cajas","sucursales","roles"];

// saveAll — guarda local inmediato + nube async
function saveAll(){
  // 1. Local inmediato
  FB_COLS.forEach(k=>LS.save(k,STATE[k]));
  LS.save("config",STATE.config);
  LS.save("ids",STATE.ids);
  // 2. Nube async (no bloquea UI)
  if(_fbReady){
    // Guardar en nube silenciosamente, solo mostrar error si falla
    Promise.all([
      ...FB_COLS.map(k=>fbSave(k,STATE[k])),
      fbSaveMeta()
    ]).then(()=>updateSyncIndicator("ok"))
      .catch(()=>updateSyncIndicator("err"));
  }
}

// loadFromFirebase — trae datos de la empresa activa
async function loadFromFirebase(){
  if(!STATE.empresaActual?.id) return false;
  updateSyncIndicator("loading");
  try{
    // Para ROYAL01: intentar cargar desde nueva ruta multi-tenant
    // Si no existe, usar colección legacy /negocio/ como fallback
    const esRoyal = STATE.empresaActual.id === "ROYAL01";
    const meta = await FB.get("_meta") || (esRoyal ? await FB.getLegacy("_meta") : null);
    if(meta){
      if(meta.config) STATE.config={...STATE.config,...meta.config};
      if(meta.ids)    STATE.ids={...STATE.ids,...meta.ids};
    }
    await Promise.all(FB_COLS.map(async k=>{
      let doc = await FB.get(k);
      // Fallback a colección legacy para ROYAL01
      if(!doc && esRoyal) doc = await FB.getLegacy(k);
      if(doc&&Array.isArray(doc.datos)){ STATE[k]=doc.datos; LS.save(k,doc.datos); }
    }));
    _fbReady=true;
    updateSyncIndicator("ok");
    return true;
  }catch(e){
    console.warn("loadFromFirebase:",e.message);
    updateSyncIndicator("err");
    _fbReady=true;
    return false;
  }
}

function toast(msg, type="info", dur=2800){
  const colors = {info:"var(--text)",ok:"var(--green)",err:"var(--red)",warn:"var(--accent)"};
  const textColors = {info:"var(--bg)",ok:"white",err:"white",warn:"var(--bg)"};

let _notifPermission = "default";

async function solicitarPermisosNotificacion(){
  if(!("Notification" in window)) return false;
  if(Notification.permission==="granted"){ _notifPermission="granted"; return true; }
  if(Notification.permission==="denied"){ _notifPermission="denied"; return false; }
  const result = await Notification.requestPermission();
  _notifPermission = result;
  return result==="granted";
}

function pushNotif(titulo, cuerpo, opciones={}){
  if(!("Notification" in window)||Notification.permission!=="granted") return;
  const n = new Notification(titulo, {
    body: cuerpo,
    icon: opciones.icon||"https://em-content.zobj.net/source/google/387/barber-pole_1f488.png",
    badge: opciones.badge||"",
    tag: opciones.tag||Date.now().toString(),
    ...opciones
  });
  n.onclick = ()=>{ window.focus(); n.close(); if(opciones.onClick) opciones.onClick(); };
  return n;
}

// Verificar citas y enviar notificación push si aplica
function checkCitasParaNotif(){
  if(Notification.permission!=="granted") return;
  const ahora=new Date();
  const descartados=JSON.parse(sessionStorage.getItem("notif_desc")||"[]");
  STATE.citas.forEach(cita=>{
    if(!cita.clienteId||!cita.hora) return;
    const citaDT=new Date(cita.fecha+"T"+cita.hora+":00");
    const diffMin=(citaDT-ahora)/60000;
    const cli=STATE.clientes.find(c=>c.id===cita.clienteId);
    const nombre=cli?.nombre||"Cliente";
    // 24h antes
    const key24="notif_"+cita.id+"_24";
    if(diffMin>=1380&&diffMin<=1500&&!descartados.includes(key24)){
      pushNotif("📅 Cita mañana",`${nombre} — ${cita.titulo} a las ${cita.hora}`,{tag:key24});
      descartados.push(key24);
    }
    // 1h antes
    const key1="notif_"+cita.id+"_1";
    if(diffMin>=50&&diffMin<=70&&!descartados.includes(key1)){
      pushNotif("⏰ Cita en 1 hora",`${nombre} — ${cita.titulo} a las ${cita.hora}`,{tag:key1});
      descartados.push(key1);
    }
  });
  sessionStorage.setItem("notif_desc",JSON.stringify(descartados));
}

// Buscar producto por código de barras
function buscarPorCodigo(codigo){
  codigo = codigo.trim();
  if(!codigo) return null;
  return STATE.productos.find(p=>p.codigoBarras&&p.codigoBarras.trim()===codigo);
}

// Agregar al carrito por código (usado en ventas y en modo caja)
function agregarAlCarritoPorCodigo(codigo){
  const prod = buscarPorCodigo(codigo);
  if(!prod){
    toast(`⚠️ Código ${codigo} no encontrado en catálogo`,"warn");
    return false;
  }
  const stk=getStock(prod.id);
  if(stk!==null&&stk<=0){
    toast(`⚠️ Sin stock: ${prod.nombre}`,"err");
    return false;
  }
  if(!STATE._items) STATE._items=[];
  // Si ya está en el carrito, incrementar cantidad
  const existente=STATE._items.find(it=>it.prodId===prod.id);
  if(existente){
    existente.cant++;
  } else {
    STATE._items.push({prodId:prod.id,nombre:prod.nombre,precio:prod.precio,cant:1,desc:0});
  }
  toast(`✅ ${prod.nombre} — ${fmtMoney(prod.precio)}`,"ok",1500);
  // Sonido de beep visual
  const beep=document.getElementById("scanBeep");
  if(beep){ beep.style.background="var(--green)"; setTimeout(()=>beep.style.background="",300); }
  return true;
}

// Quitar del inventario por código (solo quita stock sin venta)
function quitarStockPorCodigo(codigo, cantidad=1){
  const prod=buscarPorCodigo(codigo);
  if(!prod) return toast(`⚠️ Código ${codigo} no encontrado`,"warn");
  if(prod.tipo==="servicio") return toast(`⚠️ Los servicios no tienen stock`,"warn");
  // Registrar ajuste de inventario como "salida"
  const ajuste={
    id:uid("i"), visitaId:"ADJ"+Date.now(), fecha:today(), hora:nowTime(),
    productoId:prod.id, cantidad, precioUnitario:0, descuento:0, total:0,
    metodoPago:"ajuste", clienteId:null, empleadoId:STATE.user?.id||null,
    cajaId:null, notas:"Ajuste de inventario — salida por código"
  };
  STATE.ingresos.push(ajuste);
  saveAll();
  toast(`📦 Stock ajustado: -${cantidad} ${prod.nombre}`,"ok");
}

// Iniciar escáner de cámara
async function iniciarScanner(videoId, onResult){
  if(_scannerActivo) await detenerScanner();
  if(typeof ZXing==="undefined"){
    toast("⚠️ Librería de escáner no disponible","err"); return;
  }
  try{
    _codeReader = new ZXing.BrowserMultiFormatReader();
    _scannerActivo = true;
    const videoEl=document.getElementById(videoId);
    if(!videoEl) return;
    await _codeReader.decodeFromVideoDevice(null, videoId, (result,err)=>{
      if(result){
        onResult(result.getText());
      }
    });
  }catch(e){
    toast("⚠️ No se pudo acceder a la cámara: "+e.message,"err");
    _scannerActivo=false;
  }
}

async function detenerScanner(){
  if(_codeReader){ try{ _codeReader.reset(); }catch(e){} _codeReader=null; }
  _scannerActivo=false;
}

// Backup auto cada 10 min
let _bkTimer = null;
function startBackup(){
  if(_bkTimer) clearInterval(_bkTimer);
  _bkTimer = setInterval(()=>{ if(STATE.user) autoBackup(); }, 600000);
}
function autoBackup(){
  const snap = { ts:new Date().toISOString(), ...Object.fromEntries(
    ["usuarios","productos","ingresos","gastos","clientes","citas","cajas","sucursales","roles","config","ids"]
    .map(k=>[k,JSON.parse(JSON.stringify(STATE[k]||STATE.config))])
  )};
  let bk=[]; try{ bk=JSON.parse(localStorage.getItem("np_bk")||"[]"); }catch(e){}
  bk.unshift(snap); if(bk.length>5) bk.length=5;
  localStorage.setItem("np_bk",JSON.stringify(bk));
  toast("💾 Backup automático","ok",1800);
}
function restoreBackup(){
  let bk=[]; try{ bk=JSON.parse(localStorage.getItem("np_bk")||"[]"); }catch(e){}
  if(!bk.length) return null;
  const snap=bk[0];
  ["usuarios","productos","ingresos","gastos","clientes","citas","cajas","sucursales"].forEach(k=>{ if(snap[k]) STATE[k]=snap[k]; });
  if(snap.config) STATE.config=snap.config;
  if(snap.ids) STATE.ids=snap.ids;
  saveAll(); return snap.ts;
}

// Inventario: producto con stock
function getStock(productoId){
  const prod = STATE.productos.find(p=>p.id===productoId);
  if(!prod || prod.tipo==="servicio") return null; // servicios no tienen stock
  // Stock inicial - ventas
  const vendido = STATE.ingresos.filter(i=>i.productoId===productoId).reduce((s,i)=>s+i.cantidad,0);
  return (prod.stockInicial||0) - vendido;
}

function stockBajo(){
  return STATE.productos.filter(p=>p.tipo==="producto"&&getStock(p.id)!==null&&getStock(p.id)<=(STATE.config.stockMinimo||5));
}

// Caja activa
function cajaActiva(){
  return STATE.cajas.find(c=>c.estado==="abierta"&&c.sucursalId===STATE.config.sucursalActiva);
}

// Comisiones empleado en rango
function comisionesEmpleado(empId, desde, hasta){
  return STATE.ingresos
    .filter(i=>i.empleadoId===empId && (!desde||i.fecha>=desde) && (!hasta||i.fecha<=hasta))
    .reduce((s,i)=>{
      const emp = STATE.usuarios.find(u=>u.id===empId);
      const pct = emp?.comision||0;
      return s + (i.total*(pct/100));
    },0);
}

function renderApp(){
  const app = $("app");

  if(sessionStorage.getItem("np_sa")==="1" && !STATE.isSuperAdmin){
    STATE.isSuperAdmin=true;
    STATE.user={id:0,username:"superadmin",role:"superadmin",nombre:"Super Admin"};
  }

  // 2. Restaurar empresa desde sessionStorage
  if(!STATE.empresaActual){
    const empSaved=sessionStorage.getItem("np_empresa");
    if(empSaved){ try{ STATE.empresaActual=JSON.parse(empSaved); }catch(e){} }
  }

  // 3. Si es superadmin → mostrar panel SA
  if(STATE.isSuperAdmin){
    app.innerHTML = buildSuperAdminPanel();
    attachSuperAdminEvents();
    return;
  }

  // 4. Si no hay empresa → mostrar selector de empresa
  if(!STATE.empresaActual){
    app.innerHTML = buildLogin();
    attachLoginEvents();
    return;
  }

  // 5. Restaurar sesión de usuario
  if(!STATE.user){
    const saved=sessionStorage.getItem("np_session");
    if(saved){
      try{
        const u=JSON.parse(saved);
        const existe=STATE.usuarios.find(x=>x.id===u.id&&x.username===u.username);
        if(existe) STATE.user={id:existe.id,username:existe.username,role:existe.role,nombre:existe.nombre||existe.username};
      }catch(e){}
    }
  }

  // 6. Si no hay usuario → mostrar login
  if(!STATE.user){
    app.innerHTML = buildLogin();
    attachLoginEvents();
    return;
  }

  // 7. Mostrar app normal
  app.innerHTML = buildLayout();
  attachLayoutEvents();
  const rolActual=getRolActual();
  const primerTab=rolActual?.esAdmin?"dashboard":"ventas";
  goTab(primerTab);
}

function attachLoginEvents(){
  // ── Paso 1: ingresar código de empresa ──
  const ingresarCodigo = async () => {
    const codigo = ($("lCodigo")?.value||"").trim().toUpperCase();
    if(!codigo){ $("lErrCodigo").textContent="Ingresa el código de tu empresa."; return; }
    $("lErrCodigo").textContent="🔄 Buscando empresa...";
    $("btnIngresarCodigo").disabled=true;

    // Guardar empresa en sessionStorage para persistir entre recargas
    const empresa = await cargarEmpresaPorCodigo(codigo);
    if(!empresa||!empresa.nombre){
      $("lErrCodigo").textContent="❌ Código incorrecto o empresa no encontrada.";
      $("btnIngresarCodigo").disabled=false;
      return;
    }
    STATE.empresaActual = {...empresa, id:codigo};
    sessionStorage.setItem("np_empresa", JSON.stringify(STATE.empresaActual));
    // Cargar datos de esta empresa
    await loadFromFirebase();
    renderApp();
  };

  $("btnIngresarCodigo")?.addEventListener("click", ingresarCodigo);
  $("lCodigo")?.addEventListener("keypress", e=>{ if(e.key==="Enter") ingresarCodigo(); });
  $("lCodigo")?.focus();

  // ── Cambiar empresa ──
  $("btnCambiarEmpresa")?.addEventListener("click", e=>{
    e.preventDefault();
    STATE.empresaActual=null;
    sessionStorage.removeItem("np_empresa");
    sessionStorage.removeItem("np_session");
    STATE.user=null;
    renderApp();
  });

  // ── Paso 2: login con credenciales ──
  const doLogin = () => {
    const u=$("lUser")?.value.trim(), p=$("lPass")?.value;
    if(!u||!p){ if($("lErr")) $("lErr").textContent="Ingresa usuario y contraseña."; return; }

    const intentarLogin=(usuarios)=>{
      const found=usuarios.find(x=>x.username===u&&x.password===p);
      if(found){
        STATE.user={id:found.id,username:found.username,role:found.role,nombre:found.nombre||found.username};
        sessionStorage.setItem("np_session",JSON.stringify(STATE.user));
        startBackup(); iniciarMotorRecordatorios();
        renderApp();
        setInterval(checkCitasParaNotif,60000); checkCitasParaNotif();
        loadFromFirebase().then(ok=>{
          const userAct=STATE.usuarios.find(x=>x.username===STATE.user.username&&x.password===p);
          if(userAct){ STATE.user={id:userAct.id,username:userAct.username,role:userAct.role,nombre:userAct.nombre||userAct.username}; sessionStorage.setItem("np_session",JSON.stringify(STATE.user)); }
          applyTheme(STATE.config.tema); renderApp();
          if(ok){ toast("☁️ Sincronizado","ok",2000); asegurarRoyalEnSuperAdmin(); }
        });
        return true;
      }
      return false;
    };

    if(intentarLogin(STATE.usuarios)) return;
    if($("lErr")) $("lErr").textContent="Verificando credenciales...";
    loadFromFirebase().then(()=>{
      if(!intentarLogin(STATE.usuarios)) if($("lErr")) $("lErr").textContent="Usuario o contraseña incorrectos.";
    });
  };

  $("btnLogin")?.addEventListener("click",doLogin);
  $("lPass")?.addEventListener("keypress",e=>{ if(e.key==="Enter") doLogin(); });

  // ── Registro público (solo empleado) ──
  $("btnReg")?.addEventListener("click",()=>{
    const nombre=$("rNombre")?.value.trim();
    const u=$("rUser")?.value.trim(), p=$("rPass")?.value;
    const email=$("rEmail")?.value.trim()||"";
    if(!u||!p) return toast("⚠️ Usuario y contraseña requeridos","warn");
    if(u.includes(" ")) return toast("⚠️ Sin espacios en el usuario","warn");
    if(STATE.usuarios.find(x=>x.username===u)) return toast("⚠️ Ese usuario ya existe","err");
    STATE.usuarios.push({id:uid("u"),username:u,password:p,role:"Empleado",nombre:nombre||u,email,comision:0,sucursalId:null});
    saveAll(); fbSave("usuarios",STATE.usuarios);
    toast("✅ Cuenta creada. El administrador asignará tu rol.","ok",4000);
  });

  // ── Recuperar contraseña ──
  $("btnOlvidePass")?.addEventListener("click",e=>{
    e.preventDefault();
    const m=$("modalRecuperar"); if(m) m.style.display="flex";
  });
  const cerrarRec=()=>{ const m=$("modalRecuperar"); if(m) m.style.display="none"; };
  $("cerrarRecuperar")?.addEventListener("click",cerrarRec);
  $("cerrarRecuperar2")?.addEventListener("click",cerrarRec);
  $("btnEnviarRecuperar")?.addEventListener("click",async()=>{
    const username=$("recUsername")?.value.trim();
    const msgEl=$("recMsg");
    if(!username){ if(msgEl){msgEl.style.color="var(--red)";msgEl.textContent="Ingresa tu usuario.";} return; }
    const usuario=STATE.usuarios.find(u=>u.username===username);
    if(!usuario){ if(msgEl){msgEl.style.color="var(--red)";msgEl.textContent="Usuario no encontrado.";} return; }
    if(!usuario.email){ if(msgEl){msgEl.style.color="var(--red)";msgEl.textContent="Sin correo registrado. Contacta al administrador.";} return; }
    if(msgEl){msgEl.style.color="var(--accent)";msgEl.textContent="⏳ Enviando...";}
    const btn=$("btnEnviarRecuperar"); if(btn) btn.disabled=true;
    const result=await enviarEmailRestablecimiento(usuario);
    if(btn) btn.disabled=false;
    if(result.ok){ if(msgEl){msgEl.style.color="var(--green)";msgEl.textContent=`✅ Enviado a ${usuario.email}`;} setTimeout(cerrarRec,3000); }
    else { if(msgEl){msgEl.style.color="var(--red)";msgEl.textContent=`❌ Error: ${result.error}`;} }
  });

  // ── Super Admin modal ──
  $("btnLoginSA")?.addEventListener("click",e=>{
    e.preventDefault();
    const m=$("modalSA"); if(m) m.style.display="flex";
  });
  const cerrarSA=()=>{ const m=$("modalSA"); if(m) m.style.display="none"; };
  $("cerrarSA")?.addEventListener("click",cerrarSA);
  $("modalSA")?.addEventListener("click",e=>{ if(e.target.id==="modalSA") cerrarSA(); });
  $("btnLoginSAConfirm")?.addEventListener("click",()=>{
    const u=$("saUser")?.value.trim(), p=$("saPass")?.value;
    if(u===SUPER_ADMIN.username&&p===SUPER_ADMIN.password){
      STATE.isSuperAdmin=true; STATE.user={id:0,username:"superadmin",role:"superadmin",nombre:"Super Admin"};
      sessionStorage.setItem("np_sa","1");
      cerrarSA(); renderApp();
    } else {
      if($("saErr")){$("saErr").textContent="Credenciales incorrectas.";}
    }
  });
  $("saPass")?.addEventListener("keypress",e=>{ if(e.key==="Enter") $("btnLoginSAConfirm")?.click(); });
}

function buildSATabFacturacion(empresas, pricing){
  let totalMensual=0;
  const filas=empresas.filter(e=>e.estado!=="eliminado").map(e=>{
    const plan=pricing.planes[e.plan]||{nombre:"?",precio:0};
    const base=plan.precio||0;
    const desc=e.descuentoPct||0;
    const total=base*(1-desc/100);
    totalMensual+=total;
    return {e, plan, base, desc, total};

  return `

      <thead><tr><th>Empresa</th><th>Plan</th><th>Precio base</th><th>Descuento</th><th>Total mes</th><th>Estado pago</th><th>Vence</th><th>Acción</th></tr></thead>
      <tbody>
      ${filas.map(({e,plan,base,desc,total})=>`<tr>
        <td><strong>${e.nombre}</strong><br><span style="font-size:.7rem;color:var(--text2);font-family:var(--mono)">${e.id}</span></td>
        <td><span class="badge bg-${plan.color||"gray"}">${plan.nombre}</span></td>

let _saEmpresas = [];

function attachSuperAdminEvents(){
  $("btnSALogout")?.addEventListener("click",()=>{
    STATE.isSuperAdmin=false; STATE.user=null;
    sessionStorage.removeItem("np_sa");
    sessionStorage.removeItem("np_session");
    sessionStorage.removeItem("np_sa_prev");
    sessionStorage.removeItem("np_empresa");
    renderApp();
  });
  $("btnSATheme")?.addEventListener("click",()=>{ applyTheme(STATE.config.tema==="dark"?"light":"dark"); });

  // Tabs SA
  $$("[data-satab]").forEach(btn=>btn.addEventListener("click",()=>{

async function cargarSAPanel(){
  _saPricing = await loadPricing();
  _saEmpresas = await fbLoadEmpresas();
  actualizarSAStats();
  renderSATab();
}

function actualizarSAStats(){
  const activas=_saEmpresas.filter(e=>e.estado==="activo").length;
  const sobreLimite=_saEmpresas.filter(e=>{
    const plan=_saPricing?.planes?.[e.plan];
    return plan && (e.numUsuarios||0) > (plan.limiteUsuarios||9999);
  }).length;
  let totalFact=0;
  _saEmpresas.forEach(e=>{
    const plan=_saPricing?.planes?.[e.plan];
    if(plan) totalFact += (plan.precio||0)*(1-(e.descuentoPct||0)/100);
  });
  const el=id=>document.getElementById(id);
  if(el("saNumEmpresas"))   el("saNumEmpresas").textContent=activas;
  if(el("saNumUsuarios"))   el("saNumUsuarios").textContent=_saEmpresas.reduce((s,e)=>s+(e.numUsuarios||0),0);
  if(el("saFacturacionTotal")) el("saFacturacionTotal").textContent="$"+totalFact.toFixed(2);
  if(el("saSobreLimite"))  el("saSobreLimite").textContent=sobreLimite;
}

function renderSATab(){
  const container=$("saTabContent"); if(!container) return;
  container.innerHTML=buildSATab(_saTabActual, _saEmpresas, _saPricing);
  attachSATabEvents(_saTabActual);
}

function attachSATabEvents(tab){
  if(tab==="empresas")    attachSAEmpresasEvents();
  if(tab==="facturacion") attachSAFacturacionEvents();
  if(tab==="precios")     attachSAPreciosEvents();
}

function generarPassSegura(){
  const upper="ABCDEFGHJKLMNPQRSTUVWXYZ";
  const lower="abcdefghjkmnpqrstuvwxyz";
  const nums="23456789";
  const syms="@#$!";
  let pass=upper[Math.floor(Math.random()*upper.length)]+
           lower[Math.floor(Math.random()*lower.length)]+
           nums[Math.floor(Math.random()*nums.length)]+
           syms[Math.floor(Math.random()*syms.length)];
  const all=upper+lower+nums+syms;
  for(let i=0;i<6;i++) pass+=all[Math.floor(Math.random()*all.length)];
  return pass.split("").sort(()=>Math.random()-.5).join("");
}

// Sistema de recordatorios SA — toasts permanentes
const _saRecordatorios = [];
function agregarRecordatorioSA(id, mensaje, tipo="warn"){
  if(_saRecordatorios.find(r=>r.id===id)) return;
  _saRecordatorios.push({id, mensaje, tipo, fecha:today()});
  mostrarBannerRecordatoriosSA();
}
function eliminarRecordatorioSA(id){
  const idx=_saRecordatorios.findIndex(r=>r.id===id);
  if(idx>=0) _saRecordatorios.splice(idx,1);
  mostrarBannerRecordatoriosSA();
  // No hacer Firebase calls aquí para evitar duplicados
  // El guardado se hace desde el evento que llama a esta función
}
function mostrarBannerRecordatoriosSA(){
  let banner=document.getElementById("saBannerRec");
  if(!banner){
    banner=document.createElement("div");
    banner.id="saBannerRec";
    banner.style.cssText="position:fixed;top:0;left:0;right:0;z-index:8000;display:flex;flex-direction:column;gap:2px";
    document.body.appendChild(banner);
  }
  banner.innerHTML=_saRecordatorios.map(r=>`
    <div style="background:${r.tipo==="warn"?"var(--accent)":"var(--red)"};color:var(--bg);
      padding:.65rem 1rem;display:flex;justify-content:space-between;align-items:center;
      font-size:.83rem;font-weight:600;gap:1rem;flex-wrap:wrap">
      <span>⚠️ ${r.mensaje}</span>
      <button onclick="eliminarRecordatorioSA('${r.id}')"
        style="background:rgba(0,0,0,.25);border:none;border-radius:6px;padding:.25rem .75rem;
        cursor:pointer;color:inherit;font-size:.8rem;white-space:nowrap">✓ Marcar listo</button>
    </div>`).join("");
}

// Cargar/guardar pricing desde Firebase (SA lo puede modificar)
async function loadPricing(){
  try{
    const doc = await FB.getSA("_pricing");
    return doc ? doc : PRICING_DEFAULT;
  }catch(e){ return PRICING_DEFAULT; }
}
async function savePricing(pricing){
  try{ await FB.setSA("_pricing", pricing); return true; }
  catch(e){ return false; }
}

// ── Calcular factura mensual de una empresa ──
function calcularFacturaEmpresa(empresa, usuarios, pricing){
  if(!pricing||!empresa) return {total:0,detalle:[],excedente:0,bloqueado:false};
  const plan = pricing.planes[empresa.plan];
  if(!plan) return {total:0,detalle:[],excedente:0,bloqueado:false};

  // Precio base del plan
  let total = plan.precio || 0;
  const detalle = [{concepto:`Plan ${plan.nombre}`, monto:total}];

  // Contar usuarios reales activos por tier
  const usrActivos = usuarios.filter(u=>!u.eliminado);
  const conteo = { admin:0, avanzado:0, basico:0 };
  usrActivos.forEach(u=>{
    const tierUser = empresa.tierUsuarios?.[u.id] || inferirTierUsuario(u, pricing);
    if(tierUser==="admin")    conteo.admin++;
    else if(tierUser==="avanzado") conteo.avanzado++;
    else conteo.basico++;
  });

  // Calcular excedentes sobre los incluidos en el plan
  const incluidos = plan.usuariosIncluidos || {};
  let excedente = 0;
  Object.entries(conteo).forEach(([tier, num])=>{
    const inc = incluidos[tier] || 0;
    const extra = Math.max(0, num - inc);
    if(extra > 0){
      const precio = pricing.tiers[tier]?.precio || 0;
      const monto = extra * precio;
      excedente += monto;
      detalle.push({concepto:`${extra} ${pricing.tiers[tier]?.nombre||tier} adicional(es)`, monto});
    }
  });
  total += excedente;

  // Aplicar descuento si hay (empresa puede tener descuento especial)
  const descPct = empresa.descuentoPct || 0;
  if(descPct > 0){
    const desc = total * (descPct/100);
    detalle.push({concepto:`Descuento ${descPct}%`, monto:-desc});
    total -= desc;
  }

  // Verificar si excede el límite de usuarios
  const bloqueado = usrActivos.length > (plan.limiteUsuarios || 9999);

  return {total, detalle, excedente, bloqueado,
          totalUsuarios:usrActivos.length,
          limiteUsuarios:plan.limiteUsuarios,
          conteo};
}

// Inferir tier de un usuario por su rol
function inferirTierUsuario(usuario, pricing){
  const roleName = (usuario.role||"").toLowerCase();
  if(roleName==="administrador"||roleName==="admin"||roleName==="superadmin") return "admin";
  // Revisar si el rol del usuario tiene módulos que corresponden a avanzado
  const tiersKeys = Object.keys(pricing?.tiers||PRICING_DEFAULT.tiers);
  // Por defecto: si tiene rol con muchos módulos → avanzado, sino → basico
  return roleName.includes("avanz")||roleName.includes("advanc") ? "avanzado" : "basico";
}

// Capturar el evento de instalación PWA
let _pwaInstallPrompt = null;
window.addEventListener("beforeinstallprompt", e=>{
  e.preventDefault();
  _pwaInstallPrompt = e;
  const btn = document.getElementById("btnInstalarPWA");
  if(btn) btn.style.display="flex";
});
window.addEventListener("appinstalled", ()=>{
  toast("🎉 ¡App instalada correctamente!","ok",4000);
  _pwaInstallPrompt = null;
  const btn = document.getElementById("btnInstalarPWA");
  if(btn) btn.style.display="none";
});

function attachLayoutEvents(){
  applySyncIndicator(); // restaurar estado de sync apenas aparece el sidebar
  $$(".nav-btn[data-tab]").forEach(b=>b.addEventListener("click",()=>{ closeSidebar(); goTab(b.dataset.tab); }));
  $("btnLogout")?.addEventListener("click",()=>{
    STATE.user=null;
    sessionStorage.removeItem("np_session");
    if(_bkTimer) clearInterval(_bkTimer);
    // Mantener la empresa activa para no tener que re-ingresar el código
    renderApp();
  });

  // Botón volver al Super Admin (si entró desde SA)
  $("btnVolverSA")?.addEventListener("click",()=>{
    STATE.isSuperAdmin=true;
    STATE.user=null;
    STATE.empresaActual=null;
    sessionStorage.setItem("np_sa","1");
    sessionStorage.removeItem("np_session");
    sessionStorage.removeItem("np_empresa");
    sessionStorage.removeItem("np_sa_prev");
    // Limpiar datos de empresa anterior del STATE
    STATE.usuarios=[]; STATE.productos=[]; STATE.ingresos=[];
    STATE.gastos=[]; STATE.clientes=[]; STATE.citas=[];
    STATE.cajas=[]; STATE.sucursales=[]; STATE.roles=[];
    renderApp();
  });
  $("btnTheme")?.addEventListener("click",()=>{ applyTheme(STATE.config.tema==="dark"?"light":"dark"); saveAll(); });
  $("btnInstalarPWA")?.addEventListener("click",async()=>{
    if(_pwaInstallPrompt){
      _pwaInstallPrompt.prompt();
      const result = await _pwaInstallPrompt.userChoice;
      if(result.outcome==="accepted") toast("🎉 ¡Instalando la app!","ok");
      _pwaInstallPrompt = null;
    } else {
      // iPhone: instrucciones manuales
      toast("En Safari: toca Compartir → Agregar a pantalla de inicio","ok",5000);
    }
  });
  $("hbg")?.addEventListener("click",()=>{ $("sidebar").classList.toggle("open"); $("ovl").classList.toggle("open"); });
  $("ovl")?.addEventListener("click",closeSidebar);
}

function closeSidebar(){ $("sidebar")?.classList.remove("open"); $("ovl")?.classList.remove("open"); }

function goTab(tab){
  STATE.activeTab=tab;
  const renders={
    dashboard:renderDashboard, ventas:renderVentas, caja:renderCaja,
    clientes:renderClientes, catalogo:renderCatalogo, gastos:renderGastos,
    agenda:renderAgenda, contabilidad:renderContabilidad, empleados:renderEmpleados,
    reportes:renderReportes, usuarios:renderUsuarios, sucursales:renderSucursales,
    configuracion:renderConfiguracion, whatsapp:renderRecordatorios, roles:renderRoles,
    suscripcion: ()=>renderSuscripcion()
  };
  const fn=renders[tab];
  if(!fn) return;
  const mc=$("mainContent"); if(!mc) return;
  const result=fn();
  if(result instanceof Promise){
    mc.innerHTML=`<div class="empty"><div class="empty-icon">⏳</div><p>Cargando...</p></div>`;
    result.then(html=>{ mc.innerHTML=html||""; attachTabEvents(tab); });
  } else {
    mc.innerHTML=result||"";
    attachTabEvents(tab);
  }
}

function renderDashboard(){
  const totalIng = STATE.ingresos.reduce((s,i)=>s+i.total,0);
  const totalGas = STATE.gastos.reduce((s,g)=>s+g.monto,0);
  const balance = totalIng-totalGas;
  const totalClientes = STATE.clientes.length;
  const citasHoy = STATE.citas.filter(c=>c.fecha===today()).length;

  // Datos gráfico 6 meses
  const hoy=new Date();
  const labels=[], dataI=[], dataG=[], dataB=[];
  for(let i=5;i>=0;i--){
    const f=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
    const ym=`${f.getFullYear()}-${String(f.getMonth()+1).padStart(2,"0")}`;
    labels.push(f.toLocaleString("es",{month:"short"}));
    const ing=STATE.ingresos.filter(x=>x.fecha.startsWith(ym)).reduce((s,x)=>s+x.total,0);
    const gas=STATE.gastos.filter(x=>x.fecha.startsWith(ym)).reduce((s,x)=>s+x.monto,0);
    dataI.push(ing); dataG.push(gas); dataB.push(ing-gas);
  }

  // Top productos
  const prodMap={};
  STATE.ingresos.forEach(i=>{ prodMap[i.productoId]=(prodMap[i.productoId]||0)+i.total; });
  const topProds=Object.entries(prodMap).map(([id,t])=>({prod:STATE.productos.find(p=>p.id==id),total:t})).filter(x=>x.prod).sort((a,b)=>b.total-a.total).slice(0,5);

  // Top clientes
  const cliMap={};
  STATE.ingresos.forEach(i=>{ if(i.clienteId) cliMap[i.clienteId]=(cliMap[i.clienteId]||0)+i.total; });
  const topClis=Object.entries(cliMap).map(([id,t])=>({cli:STATE.clientes.find(c=>c.id==id),total:t})).filter(x=>x.cli).sort((a,b)=>b.total-a.total).slice(0,3);

  // Alertas
  const stockAlerts=stockBajo();
  const alertsHTML=stockAlerts.length?`<div class="alert alert-warning">⚠️ ${stockAlerts.length} producto(s) con stock bajo: ${stockAlerts.map(p=>p.nombre).join(", ")}</div>`:"";

  setTimeout(()=>{
    const ctx=$("chartMain")?.getContext("2d");
    if(ctx){
      if(window._chart) window._chart.destroy();
      window._chart=new Chart(ctx,{type:"bar",data:{labels,datasets:[
        {label:"Ingresos",data:dataI,backgroundColor:"rgba(45,184,122,0.7)",borderRadius:5},
        {label:"Gastos",data:dataG,backgroundColor:"rgba(232,64,64,0.6)",borderRadius:5},
        {label:"Balance",data:dataB,type:"line",borderColor:"var(--accent)",backgroundColor:"transparent",tension:0.4,pointRadius:4,pointBackgroundColor:"var(--accent)"}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#aaa"}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmtMoney(c.raw)}`}}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,ticks:{callback:v=>STATE.config.moneda+v}}}}});
    }
  },80);

  return `<div class="page-header"><div class="page-title">Dashboard</div><span class="branch-tag">📍${STATE.sucursales.find(s=>s.id===STATE.config.sucursalActiva)?.nombre||"Principal"}</span></div>
  ${alertsHTML}
  <div class="stats-grid">
    <div class="stat"><div class="stat-icon">💰</div><div class="stat-label">Ingresos Totales</div><div class="stat-value c-green">${fmtMoney(totalIng)}</div></div>
    <div class="stat"><div class="stat-icon">📉</div><div class="stat-label">Gastos Totales</div><div class="stat-value c-red">${fmtMoney(totalGas)}</div></div>
    <div class="stat"><div class="stat-icon">⚖️</div><div class="stat-label">Balance Neto</div><div class="stat-value ${balance>=0?"c-green":"c-red"}">${fmtMoney(balance)}</div></div>
    <div class="stat"><div class="stat-icon">👥</div><div class="stat-label">Clientes</div><div class="stat-value c-blue">${totalClientes}</div></div>
    <div class="stat"><div class="stat-icon">📅</div><div class="stat-label">Citas Hoy</div><div class="stat-value c-accent">${citasHoy}</div></div>
    <div class="stat"><div class="stat-icon">🧾</div><div class="stat-label">Total Ventas</div><div class="stat-value">${STATE.ingresos.length}</div></div>
  </div>
  <div class="card"><div class="card-title">Ingresos vs Gastos — Últimos 6 meses</div><div class="chart-box"><canvas id="chartMain" height="260"></canvas></div></div>
  <div class="two-col">
    <div class="card"><div class="card-title">🏆 Top Productos</div>
    ${topProds.length?`<table><thead><tr><th>Producto</th><th>Total</th></tr></thead><tbody>
    ${topProds.map(x=>`<tr><td>${x.prod.nombre}</td><td class="amt-green">${fmtMoney(x.total)}</td></tr>`).join("")}
    </tbody></table>`:`<div class="empty"><div class="empty-icon">📦</div><p>Sin ventas aún</p></div>`}
    </div>
    <div class="card"><div class="card-title">👑 Mejores Clientes</div>
    ${topClis.length?`<table><thead><tr><th>Cliente</th><th>Total</th></tr></thead><tbody>
    ${topClis.map(x=>`<tr><td>${x.cli.nombre}</td><td class="amt-blue">${fmtMoney(x.total)}</td></tr>`).join("")}
    </tbody></table>`:`<div class="empty"><div class="empty-icon">👥</div><p>Sin clientes con compras</p></div>`}
    </div>
  </div>`;
}

function renderCaja(){
  const caja=cajaActiva();

  const gasHoy=STATE.gastos.filter(g=>g.fecha===hoy&&g.cajaId===caja?.id).reduce((s,g)=>s+g.monto,0);

  if(!caja) return `<div class="page-header"><div class="page-title">▣ Caja</div></div>
    <div class="caja-closed">
      <div style="font-size:3rem;margin-bottom:1rem">🔒</div>

      <p style="color:var(--text2);margin-bottom:1.5rem">Abre la caja para comenzar a registrar ventas</p>

      <button class="btn btn-green" id="btnAbrirCaja">🔓 Abrir Caja</button>
    </div>`;

  const movHoy=[
    ...STATE.ingresos.filter(i=>i.fecha===hoy&&i.cajaId===caja.id).map(i=>{const p=STATE.productos.find(pr=>pr.id===i.productoId);return{hora:i.hora||"--:--",tipo:"INGRESO",concepto:p?.nombre||"—",monto:i.total,pago:i.metodoPago||"efectivo"};}),
    ...STATE.gastos.filter(g=>g.fecha===hoy&&g.cajaId===caja.id).map(g=>({hora:g.hora||"--:--",tipo:"GASTO",concepto:g.descripcion,monto:g.monto,pago:"—"}))
  ].sort((a,b)=>b.hora.localeCompare(a.hora));

  const saldo=caja.montoInicial+ingHoy-gasHoy;

  return `<div class="page-header"><div class="page-title">▣ Caja</div>
    ${STATE.user.role==="admin"?`<button class="btn btn-danger btn-sm" id="btnCerrarCaja">🔒 Cerrar Caja</button>`:""}

  <div class="stats-grid">
    <div class="stat"><div class="stat-icon">🏦</div><div class="stat-label">Saldo Actual</div><div class="stat-value c-green">${fmtMoney(saldo)}</div></div>
    <div class="stat"><div class="stat-icon">💰</div><div class="stat-label">Ingresos Hoy</div><div class="stat-value c-green">${fmtMoney(ingHoy)}</div></div>
    <div class="stat"><div class="stat-icon">💸</div><div class="stat-label">Gastos Hoy</div><div class="stat-value c-red">${fmtMoney(gasHoy)}</div></div>
    <div class="stat"><div class="stat-icon">🧾</div><div class="stat-label">Ventas Hoy</div><div class="stat-value">${STATE.ingresos.filter(i=>i.fecha===hoy&&i.cajaId===caja.id).length}</div></div>
  </div>
  <div class="card"><div class="card-title">Movimientos del día</div>
  <div class="table-wrap"><table><thead><tr><th>Hora</th><th>Tipo</th><th>Concepto</th><th>Método</th><th>Monto</th></tr></thead>
  <tbody>${movHoy.length?movHoy.map(m=>`<tr><td class="amt">${m.hora}</td><td><span class="badge ${m.tipo==="INGRESO"?"bg-green":"bg-red"}">${m.tipo}</span></td><td>${m.concepto}</td><td><span class="badge bg-gray">${m.pago}</span></td><td class="${m.tipo==="INGRESO"?"amt-green":"amt-red"}">${fmtMoney(m.monto)}</td></tr>`).join(""):`<tr><td colspan="5"><div class="empty"><p>Sin movimientos hoy</p></div></td></tr>`}

function renderVentas(){
  if(!STATE._items) STATE._items=[];
  const caja=cajaActiva();
  const optsProds=STATE.productos.length
    ?STATE.productos.map(p=>{const stk=getStock(p.id);const stklbl=stk!==null?` (stock:${stk})`:"";return `<option value="${p.id}">${p.nombre}${stklbl} — ${fmtMoney(p.precio)}</option>`;}).join("")
    :`<option value="">Sin productos</option>`;
  const optsClientes=`<option value="">Sin cliente asignar</option>`+STATE.clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join("");
  // Pre-seleccionar el empleado logueado por defecto
  const optsEmpleados=STATE.usuarios.map(u=>`<option value="${u.id}" ${u.id===STATE.user.id?"selected":""}>${u.nombre||u.username}</option>`).join("");

  // Historial agrupado por visitaId
  const visitas={};
  STATE.ingresos.forEach(i=>{
    const vid=i.visitaId||("v"+i.id);
    if(!visitas[vid]) visitas[vid]={vid,fecha:i.fecha,hora:i.hora,items:[],clienteId:i.clienteId,empleadoId:i.empleadoId,metodoPago:i.metodoPago,notas:i.notas,total:0,primerIngId:i.id};
    visitas[vid].items.push(i);
    visitas[vid].total+=i.total;
  });
  const visitasArr=Object.values(visitas).sort((a,b)=>b.primerIngId-a.primerIngId).slice(0,40);

  const filas=visitasArr.map(v=>{
    const cl=STATE.clientes.find(c=>c.id===v.clienteId);
    const prods=v.items.map(i=>{const p=STATE.productos.find(pr=>pr.id===i.productoId);return p?`${i.cantidad>1?i.cantidad+"x ":""}${p.nombre}`:"?"}).join(" · ");
    return `<tr>
      <td>${v.fecha} <span class="amt" style="font-size:.75rem">${v.hora||""}</span></td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${prods}">${prods}</td>
      <td class="amt">${v.items.length}</td>
      <td>${cl?cl.nombre:`<span style="color:var(--text3)">—</span>`}</td>

      <td class="amt-green">${fmtMoney(v.total)}</td>
      <td style="display:flex;gap:.3rem">
        <button class="icon-btn" data-action="ticketVisita" data-vid="${v.vid}" title="Ver recibo">🧾</button>
        ${STATE.user.role==="admin"?`<button class="icon-btn" data-action="delVisita" data-vid="${v.vid}" title="Eliminar">🗑️</button>`:""}
      </td>
    </tr>`;
  }).join("")||`<tr><td colspan="7"><div class="empty"><div class="empty-icon">💸</div><p>Sin ventas registradas</p></div></td></tr>`;

  // Render items agregados
  const renderItems=()=>{
    if(!STATE._items.length) return `<div style="color:var(--text3);font-size:.83rem;padding:.5rem 0;text-align:center">Sin ítems agregados</div>`;
    let gran=0;
    const rows=STATE._items.map((it,idx)=>{
      const sub=it.precio*it.cant-(it.desc||0);
      gran+=sub;
      return `<div style="display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--border)">
        <div style="flex:2;font-weight:600;font-size:.88rem">${it.nombre}</div>
        <div style="flex:1;font-size:.82rem;color:var(--text2)">${fmtMoney(it.precio)} × ${it.cant}</div>
        ${it.desc?`<div style="font-size:.78rem;color:var(--red)">-${fmtMoney(it.desc)}</div>`:""}
        <div style="font-weight:700;color:var(--green);font-family:var(--mono)">${fmtMoney(sub)}</div>
        <button class="icon-btn item-del" data-idx="${idx}" style="flex-shrink:0">🗑️</button>
      </div>`;
    }).join("");
    const iva=gran*(STATE.config.ivaPct||0)/100;
    const tot=gran+iva;
    return rows+`
      <div style="margin-top:.75rem;padding-top:.5rem;border-top:2px solid var(--border)">

      </div>`;
  };

// ════════════════════════════════════════════════════════════
//  RECORDATORIOS — PÁGINA COMPLETA
// ════════════════════════════════════════════════════════════
function renderRecordatorios(){
  const plantillas = getPlantillas();
  const ahora = new Date();

  // Citas próximas (próximos 7 días)
  const en7dias = new Date(); en7dias.setDate(en7dias.getDate()+7);
  const proximas = STATE.citas
    .filter(c => c.fecha >= today() && c.fecha <= en7dias.toISOString().slice(0,10) && c.clienteId)
    .sort((a,b) => a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora));

  const filasCitas = proximas.map(c=>{
    const cli = STATE.clientes.find(x=>x.id===c.clienteId);
    const citaFecha = new Date(c.fecha+"T"+c.hora+":00");
    const diffH = Math.round((citaFecha-ahora)/3600000);
    let urgTag = "";
    if(diffH<=1&&diffH>=0) urgTag=`<span class="badge bg-red">¡En 1h!</span>`;
    else if(diffH<=24&&diffH>0) urgTag=`<span class="badge bg-accent">Mañana</span>`;
    else if(diffH>0) urgTag=`<span class="badge bg-blue">En ${diffH}h</span>`;
    return `<tr>
      <td>${c.fecha} <span class="amt">${c.hora}</span></td>
      <td><strong>${c.titulo}</strong></td>
      <td>${cli?cli.nombre:"—"}</td>
      <td>${cli?.telefono||`<span style="color:var(--red);font-size:.75rem">Sin teléfono</span>`}</td>
      <td>${urgTag}</td>
      <td style="display:flex;gap:.3rem">
        ${cli?.telefono?`
          <button class="icon-btn" data-action="waRecordatorio" data-citaid="${c.id}" data-tipo="prox" title="WhatsApp próxima cita">💬</button>
          <button class="icon-btn" data-action="waCita24" data-citaid="${c.id}" title="WhatsApp 24h">⏰</button>
        `:`<span style="font-size:.72rem;color:var(--text3)">Sin tel.</span>`}
        <button class="icon-btn" data-action="delCita2" data-id="${c.id}">🗑️</button>
      </td>
    </tr>`;
  }).join("")||`<tr><td colspan="6"><div class="empty"><div class="empty-icon">📅</div><p>Sin citas en los próximos 7 días</p></div></td></tr>`;

  // Render plantillas
  const filasPlantillas = plantillas.map((p,idx)=>`
    <div class="card" style="margin-bottom:.75rem;border-left:3px solid var(--accent)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:.5rem">
        <strong>${p.nombre}</strong>
        <div style="display:flex;gap:.3rem">
          <button class="icon-btn" data-action="editPlantilla" data-idx="${idx}" title="Editar">✏️</button>
          <button class="icon-btn" data-action="delPlantilla" data-idx="${idx}" title="Eliminar">🗑️</button>
        </div>
      </div>
      <div class="sms-preview">${p.texto}</div>
      <div style="font-size:.72rem;color:var(--text2);margin-top:.4rem">Variables: <span class="template-chip">{nombre}</span> <span class="template-chip">{negocio}</span> <span class="template-chip">{fecha}</span> <span class="template-chip">{hora}</span> <span class="template-chip">{servicio}</span></div>
    </div>
  `).join("");

  // ── Panel alertas 24h y 1h ──
  const ahora2 = new Date();
  const citasAlerta24 = STATE.citas.filter(c=>{
    if(!c.clienteId||!c.hora) return false;
    const dt = new Date(c.fecha+"T"+c.hora+":00");
    const diff = (dt-ahora2)/3600000;
    return diff>0 && diff<=26;
  }).sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora));

  const citasAlerta1 = STATE.citas.filter(c=>{
    if(!c.clienteId||!c.hora) return false;
    const dt = new Date(c.fecha+"T"+c.hora+":00");
    const diff = (dt-ahora2)/3600000;
    return diff>0 && diff<=1.5;
  }).sort((a,b)=>a.hora.localeCompare(b.hora));

  const renderAlertaFila=(c,tipo)=>{
    const cli=STATE.clientes.find(x=>x.id===c.clienteId);
    const dt=new Date(c.fecha+"T"+c.hora+":00");
    const diffMin=Math.round((dt-ahora2)/60000);
    const restante=diffMin>60?`${Math.round(diffMin/60)}h`:`${diffMin}min`;
    const enviado=(LS.load("np_historial_wa")||[]).some(h=>h.citaId===c.id&&h.tipo===tipo);
    return `<div style="display:flex;align-items:center;gap:.75rem;padding:.65rem;background:var(--surface2);border-radius:var(--r);margin-bottom:.5rem;flex-wrap:wrap;gap:.5rem">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:.88rem">${c.titulo}</div>
        <div style="font-size:.78rem;color:var(--text2)">${cli?.nombre||"Sin cliente"} · ${c.fecha} ${c.hora} · <strong style="color:${tipo==="1h"?"var(--red)":"var(--accent)"}">en ${restante}</strong></div>
        <div style="font-size:.75rem;color:var(--text2)">${cli?.telefono||"⚠️ Sin teléfono"}</div>
      </div>
      ${enviado?`<span class="badge bg-green">✓ Enviado</span>`:""}
      ${cli?.telefono?`<button class="icon-btn" data-action="${tipo==="1h"?"waAlerta1":"waAlerta24"}" data-citaid="${c.id}" style="background:var(--green);color:white;border-color:var(--green)">💬 Enviar</button>`:`<span style="font-size:.75rem;color:var(--red)">Sin teléfono</span>`}
    </div>`;
  };

  const alertas24HTML = citasAlerta24.length
    ? citasAlerta24.map(c=>renderAlertaFila(c,"24h")).join("")
    : `<div class="empty" style="padding:1rem"><p>Sin citas en las próximas 24 horas</p></div>`;
  const alertas1HTML = citasAlerta1.length
    ? citasAlerta1.map(c=>renderAlertaFila(c,"1h")).join("")
    : `<div class="empty" style="padding:1rem"><p>Sin citas en la próxima hora</p></div>`;

  return `<div class="page-header"><div class="page-title">💬 WhatsApp — Recordatorios</div>
    <button class="btn btn-ghost btn-sm" onclick="goTab('whatsapp')">🔄 Actualizar</button>
  </div>

  <div class="two-col">
    <div class="card" style="border-top:3px solid var(--red)">
      <div class="card-title" style="color:var(--red)">⏰ Recordatorios — Próxima 1 hora</div>
      <div class="card-sub">Citas que ocurren en los próximos 60 minutos</div>
      ${alertas1HTML}
    </div>
    <div class="card" style="border-top:3px solid var(--accent)">
      <div class="card-title" style="color:var(--accent)">🔔 Recordatorios — Próximas 24 horas</div>
      <div class="card-sub">Citas de mañana — envía el recordatorio hoy</div>
      ${alertas24HTML}
    </div>
  </div>

  <div class="card">
    <div class="card-title">📅 Citas próximas (7 días)</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Fecha / Hora</th><th>Servicio</th><th>Cliente</th><th>Teléfono</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>${filasCitas}</tbody>
    </table></div>
  </div>

  <div class="two-col">
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
        <div class="page-title" style="font-size:1.1rem">✉️ Plantillas de mensaje</div>
        <button class="btn btn-outline btn-sm" id="btnNuevaPlantilla">+ Nueva plantilla</button>
      </div>
      ${filasPlantillas}
    </div>
    <div>
      <div class="page-title" style="font-size:1.1rem;margin-bottom:.75rem">🧪 Previsualizar mensaje</div>
      <div class="card">
        <div class="form-grid">
          <div class="fg span2"><label>Plantilla</label>
            <select id="prevPlantilla">${plantillas.map((p,i)=>`<option value="${i}">${p.nombre}</option>`).join("")}</select>
          </div>
          <div class="fg span2"><label>Cliente de prueba</label>
            <select id="prevCliente"><option value="">— Sin cliente —</option>${STATE.clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join("")}</select>
          </div>
          <div class="fg"><label>Cita de prueba</label>
            <select id="prevCita"><option value="">— Sin cita —</option>${STATE.citas.map(c=>`<option value="${c.id}">${c.fecha} ${c.hora} ${c.titulo}</option>`).join("")}</select>
          </div>
        </div>
        <div class="card-title" style="margin-top:.75rem">Vista previa:</div>
        <div class="sms-preview" id="smsPreview">Selecciona una plantilla y un cliente para previsualizar...</div>
        <button class="btn btn-primary btn-sm" id="btnEnviarPrev" style="margin-top:.75rem">💬 Abrir WhatsApp Web</button>
      </div>

      <div class="page-title" style="font-size:1.1rem;margin:.75rem 0">📋 Historial de mensajes WhatsApp enviados</div>
      <div class="card">
        <div id="historialRem">
          ${(()=>{
            const hist=(LS.load("np_historial_wa")||[]).slice(0,20);
            if(!hist.length) return `<div class="empty"><div class="empty-icon">💬</div><p>Sin mensajes enviados aún</p></div>`;
            return hist.map(h=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.82rem;flex-wrap:wrap;gap:.25rem">
              <div><span class="badge bg-green" style="font-size:.65rem">💬</span> <strong>${h.cliente}</strong> <span style="color:var(--text2)">— ${h.plantilla}</span></div>
              <div style="color:var(--text2);font-size:.75rem">${h.fecha} ${h.hora}</div>
            </div>`).join("");
          })()}
        </div>
      </div>
    </div>
  </div>

  <!-- Modal nueva/editar plantilla -->
  <div id="modalPlantilla" style="display:none" class="modal-bg">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalPlantillaTitulo">Nueva Plantilla</div>
        <button class="modal-close" id="cerrarModalPlantilla">✕</button>
      </div>
      <div class="fg" style="margin-bottom:.75rem"><label>Nombre de la plantilla</label><input id="pNombrePlantilla" placeholder="Ej: Recordatorio especial"></div>
      <div class="fg" style="margin-bottom:.75rem"><label>Mensaje</label><textarea id="pTextoPlantilla" rows="5" placeholder="Hola {nombre}, te esperamos en {negocio}..."></textarea></div>
      <div style="font-size:.75rem;color:var(--text2);margin-bottom:1rem">
        Variables disponibles: <strong>{nombre}</strong> · <strong>{negocio}</strong> · <strong>{fecha}</strong> · <strong>{hora}</strong> · <strong>{servicio}</strong>
      </div>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-primary" id="btnGuardarPlantilla">Guardar</button>
        <button class="btn btn-ghost" id="cerrarModalPlantilla2">Cancelar</button>
      </div>
      <input type="hidden" id="pEditIdxPlantilla">
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════════
//  CLIENTES — versión actualizada con próxima cita y SMS
// ════════════════════════════════════════════════════════════
function renderClientes(){
  const hoy = today();
  const filas=STATE.clientes.map(c=>{
    const totalCompras=STATE.ingresos.filter(i=>i.clienteId===c.id).reduce((s,i)=>s+i.total,0);
    const numCompras=STATE.ingresos.filter(i=>i.clienteId===c.id).length;
    const ultima=STATE.ingresos.filter(i=>i.clienteId===c.id).sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
    // Próxima cita
    const proxCita=STATE.citas.filter(x=>x.clienteId===c.id&&x.fecha>=hoy).sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora))[0];
    const proxTag=proxCita?`<span class="cita-prox-badge">📅 ${proxCita.fecha} ${proxCita.hora}</span>`:`<span style="color:var(--text3);font-size:.75rem">—</span>`;
    return `<tr>
      <td><strong>${c.nombre}</strong></td>
      <td>${c.telefono||"—"}</td><td>${c.email||"—"}</td>
      <td class="amt-blue">${numCompras}</td>
      <td class="amt-green">${fmtMoney(totalCompras)}</td>
      <td>${ultima?ultima.fecha:"—"}</td>
      <td>${proxTag}</td>
      <td style="display:flex;gap:.3rem;flex-wrap:wrap">
        <button class="icon-btn" data-action="verCli" data-id="${c.id}" title="Ver historial">👁️</button>
        <button class="icon-btn" data-action="agendarCita" data-id="${c.id}" title="Agendar cita">📅</button>
        ${c.telefono&&proxCita?`<button class="icon-btn" data-action="waProxCita" data-cliid="${c.id}" data-citaid="${proxCita.id}" title="WhatsApp recordatorio">💬</button>`:""}
        <button class="icon-btn" data-action="editCli" data-id="${c.id}" title="Editar">✏️</button>
        ${STATE.user.role==="admin"?`<button class="icon-btn" data-action="delCli" data-id="${c.id}" title="Eliminar">🗑️</button>`:""}
      </td>
    </tr>`;
  }).join("")||`<tr><td colspan="8"><div class="empty"><div class="empty-icon">👥</div><p>Sin clientes registrados</p></div></td></tr>`;

  return `<div class="page-header"><div class="page-title">◉ Clientes</div>
    <button class="btn btn-primary" id="btnNuevoCli">+ Nuevo Cliente</button>
  </div>
  <div class="card" id="formCli" style="display:none">
    <div class="card-title" id="formCliTitle">Nuevo Cliente</div>
    <div class="form-grid">
      <div class="fg span2"><label>Nombre completo *</label><input id="cNombre" placeholder="Juan Pérez"></div>
      <div class="fg"><label>Teléfono *</label><input id="cTel" placeholder="+503 0000-0000" type="tel"></div>
      <div class="fg"><label>Email</label><input id="cEmail" type="email" placeholder="correo@ejemplo.com"></div>
      <div class="fg span2"><label>Notas / Observaciones</label><input id="cNotas" placeholder="Alergias, preferencias, etc."></div>
      <div style="display:flex;gap:.5rem;align-items:flex-end">
        <button class="btn btn-primary" id="btnGuardarCli">Guardar</button>
        <button class="btn btn-ghost" id="btnCancelarCli">Cancelar</button>
      </div>
    </div>
    <input type="hidden" id="cEditId">
  </div>

  <!-- Modal agendar cita rápida -->
  <div id="modalAgendarCita" style="display:none" class="modal-bg">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">📅 Agendar próxima cita</div><button class="modal-close" id="cerrarModalCita">✕</button></div>
      <div style="font-size:.82rem;color:var(--text2);margin-bottom:1rem">Cliente: <strong id="citaCliNombre">—</strong></div>
      <div class="form-grid">
        <div class="fg span2"><label>Servicio *</label><input id="citaTitulo" placeholder="Ej: Corte de cabello"></div>
        <div class="fg"><label>Fecha *</label><input id="citaFechaModal" type="date"></div>
        <div class="fg"><label>Hora *</label><input id="citaHoraModal" type="time"></div>
        <div class="fg"><label>Duración (min)</label><input id="citaDurModal" type="number" value="30" min="5" step="5"></div>
        <div class="fg"><label>Empleado</label><select id="citaEmpModal"><option value="">Sin asignar</option>${STATE.usuarios.map(u=>`<option value="${u.id}">${u.nombre||u.username}</option>`).join("")}</select></div>
        <div class="fg span2"><label>Notas</label><input id="citaNotasModal" placeholder="Observaciones"></div>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:1rem">
        <button class="btn btn-primary" id="btnGuardarCitaModal">💬 Guardar + enviar WhatsApp de confirmación</button>

      </div>
      <input type="hidden" id="citaCliIdModal">

  <div class="card"><div class="card-title">Clientes registrados (${STATE.clientes.length})</div>
  <div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Teléfono</th><th>Email</th><th>Compras</th><th>Total gastado</th><th>Última visita</th><th>Próxima cita</th><th></th></tr></thead>
  <tbody>${filas}</tbody></table></div></div>`;
}

// ════════════════════════════════════════════════════════════

function renderCatalogo(){
  const filas=STATE.productos.map(p=>{
    const stk=getStock(p.id);
    const stkDisplay=stk!==null?`<span class="${stk<=(STATE.config.stockMinimo||5)?"c-red":"c-green"} amt">${stk}</span>`:`<span style="color:var(--text3)">—</span>`;
    return `<tr>
      <td><strong>${p.nombre}</strong></td>
      <td><span class="badge ${p.tipo==="servicio"?"bg-blue":"bg-accent"}">${p.tipo}</span></td>
      <td><span style="font-family:var(--mono);font-size:.75rem;color:var(--text2)">${p.codigoBarras||"—"}</span></td>
      <td class="amt">${fmtMoney(p.precio)}</td>
      <td>${stkDisplay}</td>
      <td>${p.tipo==="producto"?fmtMoney(p.costo||0):"—"}</td>
      <td>${p.tipo==="producto"&&p.costo?`<span class="c-green amt">${(((p.precio-p.costo)/p.precio)*100).toFixed(1)}%</span>`:"—"}</td>
      <td style="display:flex;gap:.3rem">
        <button class="icon-btn" data-action="editProd" data-id="${p.id}">✏️</button>

  }).join("")||`<tr><td colspan="7"><div class="empty"><div class="empty-icon">📦</div><p>Sin productos</p></div></td></tr>`;

  return `<div class="page-header"><div class="page-title">◧ Catálogo</div>
    <button class="btn btn-primary" id="btnNuevoProd">+ Nuevo</button>
  </div>
  ${stockBajo().length?`<div class="alert alert-warning">⚠️ Stock bajo: ${stockBajo().map(p=>p.nombre).join(", ")}</div>`:""}
